chapter: "AI05 — Free AI Image Generator Tools: Bina Paise Kharch Kiye Photo Kaise Banayein?"
slides:
  - n: 1
    narration: "दोस्तों, सोचो — आप सिर्फ़ एक line type करो, जैसे 'सूरज ढलते हुए समंदर किनारे एक चाय की टपरी', और कुछ ही seconds में AI आपके लिए एकदम professional photo बना दे, वो भी बिना किसी camera, बिना किसी designer के। आज ये बिल्कुल possible है, और सबसे अच्छी बात — कई tools बिल्कुल free हैं। Katixo KhojLab की इस AI series में आज हम सीखेंगे कि free AI image generator tools कौन से हैं और इन्हें इस्तेमाल कैसे करते हैं। चलो शुरू करते हैं।"
  - n: 2
    narration: "सबसे पहले समझो — AI image generator होता क्या है? ये एक ऐसा software है जो आपके लिखे हुए शब्दों को, जिसे prompt कहते हैं, समझकर एक नई image बना देता है। ये image internet से चुराई नहीं जाती, बल्कि AI लाखों photos से सीखकर खुद नई बनाता है। आप जितना साफ़ और detail में लिखोगे, image उतनी अच्छी आएगी। जैसे text लिखने के लिए ChatGPT है, वैसे ही photo बनाने के लिए ये image tools हैं। और इनमें से कई आपको रोज़ कुछ free images बनाने देते हैं।"
  - n: 3
    narration: "अब जानते हैं कुछ भरोसेमंद free tools के नाम। पहला — Microsoft Bing Image Creator, जो Microsoft का free tool है और इसमें OpenAI की technology लगी है। दूसरा — Google का ImageFX, जो Google Labs पर free मिलता है। तीसरा — Canva, जिसमें Magic Media नाम का AI image feature है और free plan में कुछ images बना सकते हो। और चौथा — Leonardo AI और Adobe Firefly, जो रोज़ कुछ free credits देते हैं। इनमें से किसी एक को भी आप सिर्फ़ अपने email या Google account से login करके इस्तेमाल कर सकते हो।"
  - n: 4
    narration: "अब step by step देखते हैं कि image कैसे बनाएं। मैं example के लिए Bing Image Creator लेता हूँ। पहला step — browser में Bing Image Creator खोलो और अपने Microsoft account से login करो। दूसरा step — सामने एक खाली box दिखेगा, जिसमें prompt लिखना है। तीसरा step — वहाँ अपना description type करो और Create बटन दबाओ। बस कुछ seconds रुको, और AI आपके सामने चार अलग-अलग images बना देगा। पसंद आने पर उन पर click करके download कर लो। इतना आसान है।"
  - n: 5
    narration: "चलो एक concrete example लेते हैं। मान लो आपकी एक छोटी bakery shop है और आपको Instagram के लिए एक poster चाहिए। आप prompt में लिख सकते हो — 'एक लकड़ी की table पर ताज़ा chocolate cake, गरम रोशनी, बादल जैसा soft background, top view'. ध्यान दो, मैंने subject, lighting, background और angle चारों बताए। Create दबाते ही AI आपके लिए चार सुंदर cake images बना देगा। इनमें से किसी एक पर अपनी shop का नाम लिखकर poster तैयार। ना कोई photoshoot, ना कोई खर्चा।"
  - n: 6
    narration: "अब prompt लिखने का असली राज़ समझो, क्योंकि अच्छी image का 90 percent यहीं तय होता है। एक अच्छा prompt बनाने का simple formula है — subject, यानी क्या चीज़ चाहिए; फिर style, जैसे cartoon, realistic photo या painting; फिर lighting और colour; और आख़िर में background या setting। जैसे — 'एक छोटा सा गाँव का स्कूल, watercolour painting style, सुबह की हल्की धूप'. जितना ज़्यादा detail दोगे, AI उतना ही आपके मन का result देगा। छोटा सा prompt देने पर result अक्सर साधारण आता है।"
  - n: 7
    narration: "कुछ काम की tips भी जान लो। पहली tip — अगर पहली image पसंद ना आए, तो हार मत मानो; prompt को थोड़ा बदलकर फिर से Create दबाओ, हर बार नई images आती हैं। दूसरी tip — English में prompt लिखने पर ज़्यादातर tools बेहतर समझते हैं, हालाँकि कई अब Hindi भी समझने लगे हैं, तो दोनों try करो। तीसरी tip — image में text या शब्द अक्सर AI टेढ़े-मेढ़े बनाता है, इसलिए नाम या heading बाद में Canva में खुद लिखना ज़्यादा safe रहता है।"
  - n: 8
    narration: "अब एक ज़रूरी सावधानी, क्योंकि power के साथ ज़िम्मेदारी आती है। पहली बात — किसी असली इंसान, ख़ासकर किसी नेता या celebrity का नकली चेहरा बनाकर फैलाना ग़लत है और कई जगह ग़ैरकानूनी भी। दूसरी बात — हर free tool की अपनी terms होती हैं; commercial यानी business में इस्तेमाल से पहले एक बार check कर लो कि वो allowed है या नहीं। तीसरी बात — AI कभी-कभी हाथ की उँगलियाँ या चेहरे थोड़े अजीब बना देता है, तो final image इस्तेमाल करने से पहले एक बार ध्यान से देख लो।"
  - n: 9
    narration: "अब सोचो ये सब किस-किस काम आ सकता है। अगर आपकी कोई दुकान या छोटा business है, तो आप social media posts, posters और menu की images बना सकते हो। अगर आप student हो, तो project और presentation के लिए unique pictures बना सकते हो। अगर आप teacher हो, तो बच्चों को समझाने के लिए मज़ेदार illustrations बना सकते हो। और अगर आप blogger या YouTuber हो, तो thumbnail और banner बना सकते हो। यानी एक ही skill, और इस्तेमाल अनगिनत। बस कल्पना की देर है।"
  - n: 10
    narration: "एक बात साफ़ कर दूँ ताकि कोई ग़लतफ़हमी ना रहे। ये free tools daily एक limit देते हैं, जैसे रोज़ कुछ images मुफ़्त, उसके बाद आपको थोड़ा इंतज़ार करना पड़ सकता है या credits ख़त्म हो जाते हैं। अगर आपको रोज़ बहुत सारी images चाहिए, तो इनके paid plan भी हैं, पर शुरुआत के लिए free plan बिल्कुल काफ़ी है। मेरी सलाह — पहले दो-तीन tools free में try करो, जो आपको सबसे अच्छा और आसान लगे, उसी पर टिक जाओ।"
  - n: 11
    narration: "तो चलो एक quick recap करते हैं, तीन points में। एक — AI image generator आपके लिखे शब्दों, यानी prompt, को समझकर नई image बनाता है, और Bing Image Creator, Google ImageFX जैसे कई tools free हैं। दो — अच्छी image के लिए prompt में subject, style, lighting और background ज़रूर बताओ, जितना detail उतना अच्छा result। तीन — असली लोगों के नकली चेहरे मत बनाओ और business में इस्तेमाल से पहले tool की terms check कर लो।"
  - n: 12
    narration: "तो दोस्तों, अब आपके पास एक ऐसी superpower है जिससे आप मन की कोई भी तस्वीर बस शब्दों से बना सकते हो, वो भी बिना एक रुपया खर्च किए। मेरी guzaarish है — आज ही कोई एक free tool खोलो और अपना पहला prompt लिखकर देखो, मज़ा आ जाएगा। शुरू में result थोड़ा अजीब लगे तो घबराना मत, practice से आप expert बन जाओगे। Aisi aur AI tips ke liye Katixo KhojLab subscribe karein! मिलते हैं अगले episode में।"
