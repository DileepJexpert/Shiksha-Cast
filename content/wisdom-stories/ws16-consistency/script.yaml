chapter: "WS16 — Consistency Vs Motivation: Asli Safalta Ka Raaz?"
slides:
  - n: 1
    narration: "दोस्तों, एक सच्ची बात बताओ — कितनी बार ऐसा हुआ है कि तुमने पूरे जोश के साथ कुछ शुरू किया? नई diet, नई exercise, नई पढ़ाई। पहले तीन दिन तो आग लगी रहती है, और फिर? वो motivation धीरे-धीरे ग़ायब हो जाता है, और हम फिर वहीं के वहीं। आज Katixo KhojLab की इस कहानी में हम जानेंगे एक बहुत बड़ा राज़ — कि असली सफलता motivation से नहीं, consistency से आती है। और ये फ़र्क समझना तुम्हारी ज़िंदगी बदल सकता है। चलो शुरू करते हैं।"
  - n: 2
    narration: "एक बार दो दोस्त थे — आरव और कबीर। दोनों ने एक साथ तय किया कि हम लेखक बनेंगे। आरव बहुत passionate था। जिस दिन उसका मूड होता, वो दस-दस घंटे लिखता, बहुत excited रहता। पर जिस दिन मूड ना हो, वो हफ़्तों कुछ नहीं लिखता। कबीर बिल्कुल शांत था। उसने एक नियम बनाया — रोज़ बस एक पन्ना, चाहे मूड हो या ना हो, चाहे अच्छा लिखूँ या बुरा। बस एक पन्ना, हर दिन, बिना नागा।"
  - n: 3
    narration: "एक साल बाद क्या हुआ, पता है? आरव के पास कुछ बिखरे हुए, अधूरे पन्ने थे, और ढेर सारी कहानियाँ जो कभी पूरी नहीं हुईं। और कबीर? कबीर के पास एक पूरी किताब तैयार थी — तीन सौ पैंसठ पन्ने। दोस्तों, कबीर आरव से ज़्यादा talented नहीं था। उसके पास बस एक चीज़ थी — consistency. यही पहली और सबसे बड़ी lesson है — रोज़ का छोटा काम, कभी-कभी के बड़े काम से कहीं ज़्यादा powerful होता है।"
  - n: 4
    narration: "अब समझो motivation और consistency का असली फ़र्क। Motivation एक emotion है — ये आती है, जाती है, मौसम की तरह बदलती रहती है। उस पर भरोसा करना ऐसा है जैसे लहरों पर घर बनाना। पर consistency एक habit है, एक decision है। ये तुम्हारे मूड पर निर्भर नहीं करती। Lesson नंबर दो — motivation का इंतज़ार मत करो। Motivation काम शुरू करने के बाद आता है, पहले नहीं। पहले action लो, जोश अपने आप पीछे-पीछे चला आएगा।"
  - n: 5
    narration: "अब एक बहुत powerful technique — इसे कहते हैं two-minute rule. कोई भी आदत इतनी छोटी बना दो कि उसे ना करना मुश्किल हो जाए। किताब पढ़नी है? बस एक page पढ़ो। Exercise करनी है? बस दो minute. दिमाग को शुरुआत से डर लगता है, बड़े target से घबराता है। पर एक बार तुम शुरू कर देते हो, तो आगे बढ़ना आसान हो जाता है। याद रखो — रोज़ दो minute, साल के तीन सौ साठ minute से बेहतर हैं जो कभी आते ही नहीं।"
  - n: 6
    narration: "Technique नंबर दो — अपनी streak मत तोड़ो, पर एक नियम याद रखो। एक calendar लो और हर दिन काम करने पर एक निशान लगाओ। धीरे-धीरे वो निशानों की chain तुम्हें motivate करेगी, क्योंकि तुम उसे तोड़ना नहीं चाहोगे। पर ज़रूरी बात — अगर एक दिन छूट भी जाए, तो खुद को मत कोसो। नियम है — कभी दो दिन लगातार मत छोड़ो। एक दिन miss होना इंसानी है, पर दूसरा दिन miss होना एक नई बुरी आदत की शुरुआत है।"
  - n: 7
    narration: "एक गहरी बात — consistency का असली जादू compounding में है। सोचो, अगर तुम रोज़ सिर्फ़ एक प्रतिशत बेहतर बनो, तो एक साल में तुम सैंतीस गुना बेहतर हो जाओगे। एक दिन का फ़र्क दिखता नहीं, इसीलिए लोग बीच में छोड़ देते हैं। बाँस का पेड़ चार साल तक ज़मीन के नीचे जड़ें फैलाता है, ऊपर कुछ नहीं दिखता। पर पाँचवें साल में वो नब्बे फ़ुट बढ़ जाता है। तुम्हारी मेहनत भी अंदर ही अंदर जड़ें बना रही है। भरोसा रखो।"
  - n: 8
    narration: "एक practical बात — अपने काम को इतना आसान बना दो कि टालना मुश्किल हो। अगर सुबह दौड़ने जाना है, तो रात को ही जूते और कपड़े तैयार रखो। अगर guitar सीखनी है, तो उसे आँखों के सामने रखो, अलमारी में बंद नहीं। Environment तुम्हारी willpower से ज़्यादा ताक़तवर है। और दूसरों को बताओ कि तुम क्या कर रहे हो, या किसी के साथ मिलकर करो। Accountability तुम्हें उन दिनों भी चलाती है जब अंदर का जोश ठंडा पड़ जाता है।"
  - n: 9
    narration: "और एक आख़िरी ज़रूरी बात — खुद पर सख़्त नहीं, धैर्यवान बनो। Consistency का मतलब perfect होना नहीं है। तुम thakoge, गिरोगे, कुछ दिन ख़राब जाएँगे। बात ये नहीं कि तुम कभी गिरो ना, बात ये है कि गिरकर तुम कितनी जल्दी वापस उठो। एक खराब दिन पूरी journey को बर्बाद नहीं करता, बस छोड़ देना करता है। दौड़ उसी की है जो बार-बार उठकर चलता रहे। रुक जाना हार नहीं, छोड़ देना हार है।"
  - n: 10
    narration: "चलो आज की तीन सबसे बड़ी सीख याद कर लें। पहली — motivation का इंतज़ार मत करो, वो action के बाद आता है, इसलिए छोटा सा action आज ही लो। दूसरी — two-minute rule अपनाओ, आदत इतनी छोटी रखो कि ना करना मुश्किल हो। और तीसरी — कभी दो दिन लगातार मत छोड़ो, क्योंकि असली ताक़त compounding में है। ये तीन बातें तुम्हें एक unstoppable इंसान बना देंगी।"
  - n: 11
    narration: "याद रखना दोस्तों — दुनिया में सबसे बड़े काम झटके में नहीं, छोटे-छोटे रोज़ के कदमों से होते हैं। पानी की एक बूँद भी रोज़ गिरे, तो पत्थर में छेद कर देती है। तुम्हें genius बनने की ज़रूरत नहीं, बस consistent बनने की ज़रूरत है। आज से एक छोटी आदत चुनो और उसे बिना नागा निभाओ। अगर ये कहानी काम की लगी, तो like, share, और Katixo KhojLab को subscribe करना मत भूलना। मिलते हैं अगली कहानी में!"
