chapter: "WS10 — Aalas Aur Procrastination Kaise Khatam Karein?"
slides:
  - n: 1
    narration: "दोस्तों, क्या तुम्हारे साथ भी ऐसा होता है — एक ज़रूरी काम सामने पड़ा है, तुम जानते हो कि करना है, फिर भी हाथ नहीं उठता? बस थोड़ी देर बाद… और वो थोड़ी देर पूरा दिन खा जाती है। फिर रात को guilt, और सुबह फिर वही कहानी। इसे कहते हैं procrastination — काम को टालने की आदत। Katixo KhojLab में आज हम एक छोटी कहानी से सीखेंगे कि इस aalas की जड़ क्या है, और इसे जड़ से कैसे खत्म करें। चलो शुरू करते हैं।"
  - n: 2
    narration: "एक गाँव में राजू नाम का एक लड़का था। उसे खेत में एक बड़ा पत्थर हटाना था जो रास्ते के बीच में पड़ा था। वो रोज़ सोचता — कल हटाऊँगा, अभी मूड नहीं है। दिन बीतते गए, पत्थर वहीं रहा। एक दिन एक बूढ़ा किसान आया, उसने पत्थर देखा और बोला — बेटा, तू पूरा पत्थर एक बार में उठाने की सोच रहा है, इसलिए डर लगता है। पहले बस एक धक्का दे, सिर्फ़ एक।"
  - n: 3
    narration: "राजू ने हँसकर एक हल्का सा धक्का दिया। पत्थर ज़रा सा हिला। किसान बोला — बस, अब एक और। राजू ने फिर धक्का दिया, फिर एक और। दस मिनट में वही पत्थर, जो महीनों से नहीं हिला था, रास्ते से हट गया। राजू हैरान रह गया। किसान मुस्कुराया और बोला — काम कभी भारी नहीं होता, बेटा। भारी होती है उसे शुरू करने से पहले की सोच।"
  - n: 4
    narration: "Lesson नंबर एक — procrastination का असली कारण aalas नहीं, डर है। हमें काम बड़ा और मुश्किल दिखता है, इसलिए दिमाग उससे बचना चाहता है। टालना दरअसल एक escape है, थकान का नहीं, बल्कि डर का। जब तुम काम को एक विशाल पहाड़ की तरह देखते हो, तो शुरू करने की हिम्मत ही नहीं होती। पर जब तुम उसे छोटे कदमों में तोड़ देते हो, वही पहाड़ आसान सीढ़ियाँ बन जाता है।"
  - n: 5
    narration: "अब पहली practical technique — इसे कहते हैं two minute rule. किसी भी काम का सिर्फ़ पहला दो मिनट का हिस्सा करो। किताब पढ़नी है? सिर्फ़ एक page खोलो। Exercise करनी है? सिर्फ़ जूते पहन लो। Science कहती है कि शुरू करना सबसे मुश्किल होता है, पर एक बार दिमाग motion में आ जाए, तो आगे बढ़ना आसान हो जाता है। राजू के एक धक्के की तरह — पहला कदम ही सबसे बड़ा होता है।"
  - n: 6
    narration: "Technique नंबर दो — अपने काम को टुकड़ों में बाँटो। एक पूरी book लिखना डराता है, पर रोज़ एक paragraph लिखना आसान है। पूरे घर की सफ़ाई भारी लगती है, पर एक दराज़ साफ़ करना आसान है। बड़े लक्ष्य को छोटे-छोटे कामों में तोड़ दो, और हर छोटे काम को पूरा करके खुद को शाबाशी दो। ये छोटी-छोटी जीतें तुम्हारे दिमाग को आगे बढ़ने का इनाम देती हैं, और motivation अपने आप बनता है।"
  - n: 7
    narration: "Technique नंबर तीन — perfection का चक्कर छोड़ो। बहुत बार हम काम इसलिए नहीं शुरू करते क्योंकि हम सोचते हैं — अगर perfect नहीं हुआ तो? याद रखो दोस्तों, एक अधूरा काम जो शुरू हो गया, उस perfect plan से हज़ार गुना बेहतर है जो कभी शुरू ही नहीं हुआ। Done is better than perfect. गलतियाँ रास्ते में सुधर जाएँगी, पर पहले रास्ते पर तो आओ।"
  - n: 8
    narration: "अब एक गहरी बात — अपने environment को आसान बनाओ। अगर पढ़ना है, तो phone दूसरे कमरे में रखो। अगर सुबह दौड़ना है, तो रात को ही कपड़े और जूते तैयार रखो। हम इंसान कमज़ोर इरादों वाले नहीं हैं, पर हमारा दिमाग आसान रास्ता चुनता है। तो अच्छे काम को आसान बना दो, और distraction को मुश्किल। तुम्हारी willpower से ज़्यादा तुम्हारा setup तुम्हें बदलता है।"
  - n: 9
    narration: "राजू ने किसान से पूछा — बाबा, पर जिस दिन मन बिल्कुल न करे, उस दिन क्या करूँ? किसान बोला — बेटा, mood का इंतज़ार मत करो। Motivation काम से पहले नहीं, काम के बाद आता है। पहले शुरू करो, मन अपने आप लग जाएगा। जो लोग सिर्फ़ mood आने पर काम करते हैं, वो ज़िंदगी भर इंतज़ार ही करते रह जाते हैं। Discipline mood से कहीं ज़्यादा भरोसेमंद दोस्त है।"
  - n: 10
    narration: "चलो आज की तीन सबसे बड़ी सीख याद कर लें। पहली — काम को छोटे टुकड़ों में बाँटो और सिर्फ़ दो मिनट से शुरू करो। दूसरी — perfect होने का इंतज़ार मत करो, शुरू करना ही जीत है। और तीसरी — mood का इंतज़ार मत करो, पहले action लो, motivation पीछे-पीछे आएगा। ये तीन छोटी आदतें तुम्हारी पूरी ज़िंदगी की रफ़्तार बदल सकती हैं।"
  - n: 11
    narration: "याद रखना दोस्तों — तुम aalsi नहीं हो, तुम्हें बस सही पहला कदम नहीं मिला था। हर बड़ा काम एक छोटे, अधूरे से धक्के से शुरू होता है। आज सबसे ज़रूरी जो काम तुम टाल रहे हो, उसका सिर्फ़ पहला दो मिनट करके देखो। तुम खुद हैरान रह जाओगे। अगर ये कहानी काम आई हो तो Like, share, aur Katixo KhojLab ko subscribe karna mat bhoolna. Milte hain agli kahani mein!"
