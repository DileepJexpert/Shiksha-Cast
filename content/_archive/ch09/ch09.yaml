chapter: "Ch 9 — Pizza Party — Introduction to Fractions"
slides:
  - n: 1
    narration: "Hello everyone, welcome back to Katixo KhojLab! Today is going to be delicious — because we're learning fractions with pizza! Have you ever shared a pizza or a roti with someone? Then you already know fractions! A fraction just means a part of something. So grab an imaginary pizza slice and let's dig in!"
  - n: 2
    narration: "Here's our menu for today. First — what is a fraction and why do we need it. Second — the top number and bottom number, called numerator and denominator. Third — half, quarter, and three-fourths. And fourth — comparing fractions to see which is bigger. By the end, you'll be a fraction master. Let's start cooking!"
  - n: 3
    narration: "Imagine you have one full pizza. Now your friend comes over and you want to share equally. What do you do? You cut it into two equal pieces! Each piece is one out of two — and we write that as one by two, or one-half. The line in the middle is just like a knife cutting the pizza. Top number says how many pieces you have, bottom number says how many total pieces there are."
  - n: 4
    narration: "Now let's learn the proper names. The top number is called the numerator — it tells you how many pieces you picked up. The bottom number is called the denominator — it tells you how many equal pieces the whole thing was cut into. In one-half, the numerator is 1 because you took one piece. The denominator is 2 because the pizza was cut into 2 pieces. Numerator up, denominator down. Easy!"
  - n: 5
    narration: "Let's go bigger. Your pizza is super popular and now four friends want to share! So you cut it into four equal pieces. Each piece is one-fourth, or one quarter. If you take one piece, that's one-fourth. If you eat two pieces, that's two-fourths. And if you're really hungry and eat three pieces, that's three-fourths! See how the numerator changes based on how many pieces you take?"
  - n: 6
    narration: "Here's something cool — half and two-fourths are the same thing! Wait, what? Yes! If you cut a pizza into 2 pieces and take 1, you have half. If you cut it into 4 pieces and take 2, you also have half. Same amount of pizza, just cut differently. These are called equivalent fractions — different numbers but the same value. Like how two five-rupee coins equal one ten-rupee note!"
  - n: 7
    narration: "Let's see fractions everywhere around us! When you fold a paper in half, each side is one-half. When you cut a chapati into four parts, each part is one-fourth. A chocolate bar with eight blocks — each block is one-eighth. Even time uses fractions! Half an hour is 30 minutes, a quarter hour is 15 minutes. You've been using fractions your whole life without knowing it!"
  - n: 8
    narration: "Now let's compare fractions. Which is bigger — one-half or one-fourth? Think about pizza again. If you cut a pizza into 2 pieces, each piece is big. If you cut the same pizza into 4 pieces, each piece is smaller. So one-half is bigger than one-fourth! Here's the trick — when the numerator is the same, the fraction with the smaller denominator is actually bigger. More cuts means smaller pieces!"
  - n: 9
    narration: "Let's try another comparison. Which is bigger — two-fourths or three-fourths? This one is easier! Same pizza, same number of cuts — four pieces. Two-fourths means you took 2 pieces. Three-fourths means you took 3 pieces. Obviously 3 pieces is more than 2 pieces! So when the denominator is the same, the bigger numerator wins. More pieces taken means a bigger fraction."
  - n: 10
    narration: "Now let's talk about one whole. If a pizza has 4 slices and you eat all 4, you've eaten four-fourths. And four-fourths equals one whole pizza! Any fraction where the numerator and denominator are the same equals one whole. Two-halves equals one. Three-thirds equals one. Eight-eighths equals one. You've eaten the entire thing!"
  - n: 11
    narration: "Here's a common mistake to avoid. Some kids think one-fourth is bigger than one-half because 4 is bigger than 2. But no! Remember — the denominator tells you how many pieces the pizza was cut into. More pieces means each piece is smaller. So one-fourth is actually smaller than one-half. Don't let the bigger number fool you. Always think about the pizza!"
  - n: 12
    narration: "Another mistake — fractions must have equal parts! If you cut a pizza into two pieces but one piece is huge and the other is tiny, those are NOT halves. Fractions only work when all the parts are equal. That's why we always say equal pieces. Fair sharing means equal parts for everyone."
  - n: 13
    narration: "Quiz time — pause and try! Question one — you cut a cake into 3 equal pieces and eat 2. What fraction did you eat? Question two — which is bigger, one-third or one-sixth? Question three — what fraction is the same as one-half if the pizza has 8 slices? Take your time, think about it, then press play!"
  - n: 14
    narration: "Answer time! Question one — you ate two-thirds! Numerator 2, denominator 3. Question two — one-third is bigger! Because 3 cuts gives bigger pieces than 6 cuts. Question three — four-eighths! Because half of 8 is 4, so 4 out of 8 is the same as 1 out of 2. Shabaash, well done if you got these!"
  - n: 15
    narration: "Quick recap of our pizza party! A fraction is a part of a whole. Numerator is on top — how many pieces you have. Denominator is on bottom — total equal pieces. When denominators are the same, bigger numerator wins. When numerators are the same, smaller denominator wins. Your homework — next time you eat a roti or a pizza, tell your family what fraction you're eating! Next chapter, we explore our amazing body — bones and muscles! Subscribe and see you soon. Bye bye!"
