chapter: "Ch 11 — Rupee Gyaan — Money & Billing"
slides:
  - n: 1
    narration: "Hello everyone, welcome back to Katixo KhojLab! Today we're learning about something everyone loves — money! Paisa! Have you ever gone to a shop and bought a chocolate or a packet of chips? Then you already know something about money. Today we'll learn about Indian coins and notes, how to add money, and even how to read a bill. Let's become money-smart!"
  - n: 2
    narration: "Here's our plan for today. First — Indian coins and notes, and how much each one is worth. Second — how to add different coins and notes together. Third — making change, which means figuring out how much money you get back. And fourth — reading a simple bill from a shop. Four skills that will make you super smart with money. Chalo, let's begin!"
  - n: 3
    narration: "Let's start with coins. In India, we have coins of 1 rupee, 2 rupees, 5 rupees, and 10 rupees. The one-rupee coin is the smallest in value. Then 2 rupees, then 5, and the 10-rupee coin is the biggest value coin. You might also see a 50-paise coin, but those are very rare now. Can you check your piggy bank and see which coins you have?"
  - n: 4
    narration: "Now let's look at notes. We have notes of 10 rupees, 20 rupees, 50 rupees, 100 rupees, 200 rupees, and 500 rupees. Each note has a different color so you can tell them apart quickly. The 10-rupee note is brownish, 20 is greenish-yellow, 50 is blue, 100 is purple, 200 is orange, and 500 is grey. All notes have Mahatma Gandhi's picture on the front. Next time you see a note, check the color and number!"
  - n: 5
    narration: "Now here's the most important thing — 100 paise equals 1 rupee. Paise are the smaller unit, like how 100 centimeters make a meter. But in real life today, we almost never use paise. Everything is in whole rupees. So when you see a price tag that says 25 rupees, it means 25 whole rupees. We write it with this symbol — the rupee symbol looks like a capital R with a line through it."
  - n: 6
    narration: "Let's practice adding money. Suppose you have a 10-rupee note, two 5-rupee coins, and three 1-rupee coins. How much money do you have in total? Let's count — 10 plus 5 plus 5 is 20, plus 1 plus 1 plus 1 is 3 more. So 20 plus 3 equals 23 rupees! Easy, right? Just add up all the notes and coins one by one. You can even sort them from biggest to smallest first."
  - n: 7
    narration: "Now let's go shopping! You want to buy a pencil that costs 8 rupees and an eraser that costs 5 rupees. How much do you need to pay in total? Just add them up — 8 plus 5 equals 13 rupees. So you need 13 rupees. If you give the shopkeeper a 20-rupee note, how much change should you get back? 20 minus 13 equals 7 rupees back. Always count your change!"
  - n: 8
    narration: "Let's learn about making change with a real example. You buy an ice cream for 30 rupees and pay with a 50-rupee note. The shopkeeper needs to give you change. How much? 50 minus 30 equals 20 rupees. The shopkeeper could give you one 10-rupee note and one 10-rupee coin, or two 10-rupee coins, or even four 5-rupee coins. There are many ways to make the same amount!"
  - n: 9
    narration: "Now let's read a bill! When you buy things from a store, you get a bill or receipt. It shows the name of each item, how many you bought, the price of each, and the total at the bottom. Let's read this example — Notebook, 1 piece, 40 rupees. Pen, 2 pieces, 15 rupees each, so 30 rupees. Eraser, 1 piece, 5 rupees. Total — 40 plus 30 plus 5 equals 75 rupees. See, you just read a bill!"
  - n: 10
    narration: "Here's a concept called estimating. Sometimes you don't need the exact total — you just want to know roughly how much you'll spend. If items cost 48, 23, and 31 rupees, you can round them to 50, 25, and 30. That gives you about 105 rupees. Close enough to plan! Estimating helps when you're in a shop and want to check if you have enough money before going to the counter. Very useful!"
  - n: 11
    narration: "A common mistake — some kids think a 500-rupee note is always better than coins. But what if you have fifty 10-rupee coins? That's also 500 rupees! The total value is the same. Another mistake — forgetting to collect change. If something costs 43 rupees and you pay 50, you should get 7 rupees back. Always count what the shopkeeper gives you back. Be smart with your money!"
  - n: 12
    narration: "Here are some money-smart tips for you. Tip one — always count your money before going to a shop. Tip two — compare prices! If one shop sells a pencil for 8 rupees and another for 6 rupees, the second shop is a better deal. Tip three — save a little every week in a piggy bank. Even 10 rupees a week becomes 520 rupees in a year! That's the power of saving."
  - n: 13
    narration: "Activity time! Pause the video and try this. Question one — you have one 100-rupee note, two 20-rupee notes, and five 1-rupee coins. What is the total? Question two — an apple costs 25 rupees. You pay 50 rupees. What change do you get? Question three — a toy costs 180 rupees. You have 150 rupees. How much more money do you need? Write your answers, then play!"
  - n: 14
    narration: "Let's check! Question one — 100 plus 20 plus 20 is 140, plus 5 ones makes 145 rupees! Question two — 50 minus 25 equals 25 rupees change! Question three — 180 minus 150 equals 30 more rupees needed! How did you do? If you got all three right, you're officially money-smart!"
  - n: 15
    narration: "Recap! India has coins of 1, 2, 5, and 10 rupees and notes of 10, 20, 50, 100, 200, and 500 rupees. To find the total, add all coins and notes. For change, subtract the cost from what you paid. Always read the bill and count your change. Your homework — next time you go to a shop with your parents, try to calculate the total before the shopkeeper does! Drop your answer in the comments. This was our last chapter in this batch — but many more are coming! Don't forget to subscribe. Bye bye, and keep learning!"
