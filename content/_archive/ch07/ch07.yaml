chapter: "Ch 7 — Tick Tock Clock — Telling Time"
slides:
  - n: 1
    narration: "Hello everyone, welcome back to Katixo KhojLab! Today we're going to learn something super useful — how to tell time! Every time you look at a clock, you're reading a secret code. And today, I'll teach you to crack that code. By the end of this video, you'll be a time-telling champion! So chalo, let's begin — tick tock, tick tock!"
  - n: 2
    narration: "Here's what we'll learn today. First — the parts of a clock, like the numbers, the hands, and what they do. Second — how to read hours and the meaning of o'clock. Third — half past and quarter past. And fourth — AM and PM, the difference between morning time and night time. Ready? Let's go!"
  - n: 3
    narration: "Look at any clock around you. See those numbers? Every clock has numbers from 1 to 12, arranged in a circle. And right in the middle, there are two hands — sometimes three. The short fat hand is the hour hand — let's call him Chhotu. And the long thin hand is the minute hand — let's call him Lambu. Chhotu tells the hour, and Lambu tells the minutes. Simple, right?"
  - n: 4
    narration: "Now here's the big rule — Chhotu the hour hand moves very slowly. He takes a whole hour to move from one number to the next. But Lambu the minute hand is super fast — he goes all the way around the clock in just one hour! That's sixty minutes for one full round. So Lambu runs, and Chhotu walks. Remember that!"
  - n: 5
    narration: "Let's start with the easiest time to read — o'clock! When Lambu the minute hand points straight up at 12, we say o'clock. And whatever number Chhotu points to, that's the hour. So if Chhotu is at 3 and Lambu is at 12, we say three o'clock. If Chhotu is at 7 and Lambu is at 12, it's seven o'clock. See? Just check where Chhotu is pointing!"
  - n: 6
    narration: "Let's practice. I'll show you a clock, and you tell me the time. Clock number one — Chhotu is at 9, Lambu is at 12. What time is it? That's right, nine o'clock! Clock number two — Chhotu is at 1, Lambu is at 12. Yes, one o'clock! You're getting it. This is what your morning alarm probably shows — time to wake up for school!"
  - n: 7
    narration: "Now let's learn half past. When Lambu points straight down at 6, he has traveled exactly half the clock. That's 30 minutes — half of 60. So we say half past. If Chhotu is between 4 and 5, and Lambu is at 6, we say half past four. Notice Chhotu is between two numbers now — because the hour isn't complete yet. He's on his way to 5."
  - n: 8
    narration: "Time for quarter past! When Lambu is at the 3, he has traveled one quarter of the clock — that's 15 minutes. So we say quarter past. If Chhotu is just past 2 and Lambu is at 3, we say quarter past two. Think of it like cutting a pizza into four pieces — one piece is one quarter. Lambu has eaten one piece of the clock!"
  - n: 9
    narration: "And there's also quarter to. When Lambu is at 9, he needs just 15 more minutes to complete the round. So we say quarter to the next hour. If Lambu is at 9 and Chhotu is almost at 5, we say quarter to five. That means 15 minutes are left before it becomes 5 o'clock. Almost there!"
  - n: 10
    narration: "Now here's something important — AM and PM. We use the same 12 numbers for the whole day, but the day has 24 hours! So we split it. AM means the morning hours, from midnight to noon — 12 AM to 11:59 AM. PM means afternoon and night, from noon to midnight — 12 PM to 11:59 PM. When you wake up at 7, that's 7 AM. When you eat dinner at 8, that's 8 PM."
  - n: 11
    narration: "Let's play a quick game. I'll say an activity, and you tell me if it's AM or PM. Brushing your teeth before school — AM or PM? AM! Bahut accha! Watching cartoons after lunch — AM or PM? PM! Having breakfast — AM! Going to bed at night — PM! See, you already know this from your daily routine. You've been using AM and PM without even knowing it!"
  - n: 12
    narration: "One common mistake — when it's half past three, some kids write 3:60 instead of 3:30. Remember, half means 30 minutes, not 60! And another mistake — confusing the hour hand and minute hand. Just remember: Chhotu is short and shows hours, Lambu is long and shows minutes. Short for short — Chhotu. Long for long — Lambu."
  - n: 13
    narration: "Okay, quiz time! Pause the video and answer these. Question one — if Chhotu is at 6 and Lambu is at 12, what time is it? Question two — what do we call the time when Lambu points at 3? Question three — you eat lunch at noon. Is that 12 AM or 12 PM? Write your answers down, then press play to check!"
  - n: 14
    narration: "Ready for answers? Question one — six o'clock! Because Chhotu is at 6 and Lambu is at 12. Question two — quarter past! Because Lambu at 3 means 15 minutes. Question three — 12 PM! Noon is 12 PM, midnight is 12 AM. How many did you get right? Give yourself a high five!"
  - n: 15
    narration: "Let's recap! A clock has 12 numbers and two hands — Chhotu for hours and Lambu for minutes. When Lambu is at 12, it's o'clock. At 6, it's half past. At 3, it's quarter past. And AM is morning, PM is evening and night. Here's your homework — look at a clock right now and tell someone what time it is! Drop the time in the comments. Next chapter, we're learning about the amazing water cycle. Subscribe and I'll see you there. Bye bye!"
