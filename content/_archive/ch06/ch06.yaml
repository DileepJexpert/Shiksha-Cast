chapter: "Ch 6 — House of Hundreds – I"
slides:
  - n: 1
    narration: "नमस्ते दोस्तों, और welcome back to Katixo KhojLab! आज हम एक बहुत ही मज़ेदार chapter शुरू कर रहे हैं — House of Hundreds. एक cool idea है: हर बड़ी number का अपना एक घर होता है, और उस घर के अंदर तीन छोटे-छोटे rooms होते हैं! आज हम 3-digit numbers के घर के अंदर जाएँगे और मिलेंगे तीन rooms से — hundreds, tens, और ones. मैं हूँ Mela, तुम्हारी guide. तो चलो, अंदर चलते हैं!"
  - n: 2
    narration: "तो आज हम क्या-क्या सीखेंगे? चार मज़ेदार चीज़ें। पहली — 3-digit numbers को कैसे पढ़ते और लिखते हैं, 100 से लेकर 999 तक। दूसरी — place value, यानी हर digit किस room में रहता है ये पता करना। तीसरी — expanded form, जैसे number 357 को उसके parts में खोलना। और चौथी — number names, यानी numbers को words में बोलना और लिखना। लगता है बहुत कुछ है? चिंता मत करो, हम step by step करेंगे!"
  - n: 3
    narration: "तो ये है big idea — एक number को एक घर समझो। हर 3-digit number एक घर है जिसके अंदर तीन rooms हैं। पहला room है Hundreds का, दूसरा room है Tens का, और तीसरा room है Ones का। अब आता है magic part — हर digit अपने room में रहता है। और अगर कोई digit अपना room बदल दे, तो पूरा number बदल जाता है! interesting है ना? चलो एक real number से देखते हैं ये कैसे काम करता है।"
  - n: 4
    narration: "चलो number 357 लेते हैं। अब इसके घर के अंदर देखते हैं। Hundreds room में है digit 3. Tens room में है digit 5. और Ones room में है digit 7. देखा? हर digit अपने room में, अपनी जगह पर बैठा है। यही idea — कि हर digit की एक place और एक room होती है — इसी को हम place value कहते हैं। simple है ना?"
  - n: 5
    narration: "अब number 357 को blocks से बनाते हैं, ताकि हम इसे सच में देख सकें। पहले, बड़े square blocks जिन्हें flats कहते हैं — हर flat एक hundred होता है। हम तीन flats लेते हैं, यानी three hundreds. फिर, लंबे blocks जिन्हें rods कहते हैं — हर rod दस होता है। हम पाँच rods लेते हैं, यानी five tens. और आख़िर में, छोटे blocks जिन्हें units कहते हैं — हर unit एक होता है। हम सात units लेते हैं, यानी seven ones. सबको मिला दो, और क्या मिलता है? 357! तुमने अभी blocks से एक number बना दिया।"
  - n: 6
    narration: "अब आता है थोड़ा सा maths magic — इसे कहते हैं expanded form. Expanded form का मतलब है number को खोलकर दिखाना कि हर digit की असली value क्या है। 357 में, 3 hundreds room में है, तो इसकी value है 300. 5 tens room में है, तो इसकी value है 50. और 7 ones room में है, तो इसकी value है 7. तो हम इसे ऐसे लिखते हैं — 357 बराबर 300 plus 50 plus 7. हर digit की value उसके room से आती है। beautiful है ना?"
  - n: 7
    narration: "चलो एक साथ try करते हैं। क्या तुम number 482 को expand कर सकते हो? चलो एक-एक करके rooms check करते हैं। 4 hundreds room में है, तो इसकी value है 400. 8 tens room में है, तो इसकी value है 80. और 2 ones room में है, तो इसकी value है सिर्फ़ 2. मिला दो — 482 बराबर 400 plus 80 plus 2. देखा कितना easy था? बस room देखो, और value पता चल जाएगी!"
  - n: 8
    narration: "अब सीखते हैं किसी number का name कैसे लिखते हैं। Number 624 लो। पहले, इसे expand करते हैं — 600 plus 20 plus 4. अब इसे पढ़ना easy है — six hundred twenty-four. हिंदी में हम कहेंगे छह सौ चौबीस, लेकिन चूँकि हम English number names सीख रहे हैं, हम कहते हैं six hundred twenty-four. देखो expanded form कैसे help करता है — एक बार parts पता चल जाएँ, तो पूरा name लिखना बहुत simple हो जाता है।"
  - n: 9
    narration: "अब एक बहुत important warning — please ये common mistake मत करना! 357 को फिर से देखो। बहुत सारे students सोचते हैं कि 5 का मतलब बस five है। लेकिन नहीं! 5 tens room में बैठा है, तो इसकी असली value है fifty, न कि five. Digit और उसकी value अलग-अलग चीज़ें हैं! और एक और बात — zero को कभी ignore मत करना। Number 408 में, tens room में एक zero है। वो zero खाली दिखता है, लेकिन वो अपनी place hold कर रहा है। उसके बिना, 408 बन जाएगा 48 — बिल्कुल अलग number!"
  - n: 10
    narration: "ठीक है, अब तुम्हारी बारी! Video को pause करो और ये तीन questions try करो। पहला question — number 596 में, hundreds, tens, और ones क्या हैं? दूसरा question — 273 का expanded form क्या है? और तीसरा question — number 305 में, tens digit की value क्या है? अपना time लो, एक pencil उठाओ, अपने answers लिखो। अभी pause करो, try करो, और फिर play दबाकर check करो!"
  - n: 11
    narration: "Answers check करने के लिए ready हो? चलो! पहला question — 596 में, hundreds है 5, tens है 9, और ones है 6. दूसरा question — 273 खुलता है 200 plus 70 plus 3. और तीसरा question — 305 में, tens digit की value है zero, क्योंकि tens room में एक zero बैठा है! कितने सही हुए? अगर एक भी सही हुआ, तो अपने आप को एक clap दो। शाबाश, well done!"
  - n: 12
    narration: "चलो जल्दी से recap करते हैं जो हमने आज सीखा। पहला — हर 3-digit number एक घर है जिसमें तीन rooms हैं — hundreds, tens, और ones. दूसरा — expanded form हमें number को खोलने देता है, जैसे 357 बराबर 300 plus 50 plus 7. और तीसरा — एक digit की value उसके room पर depend करती है, तो tens room में 5 की value है fifty. तुमने अब house of hundreds का हर room explore कर लिया है। मुझे तुम पर बहुत proud feel हो रहा है!"
  - n: 13
    narration: "जाने से पहले, घर पर करने के लिए एक fun challenge है। अपनी life से कोई भी 3-digit number सोचो — शायद तुम्हारा building number, या कोई bus number जो तुम रोज़ देखते हो। उसके hundreds, tens, और ones लिखो। फिर उसका expanded form बनाओ, और उसका name ज़ोर से बोलो, जैसे four hundred fifty-six! अपना number और उसका name comments में डालो — मुझे देखना अच्छा लगेगा। Worksheet description में है। और next time, आ रहा है Chapter 7 — Raksha Bandhan! Subscribe करना मत भूलना। बाय बाय, जल्दी मिलते हैं!"
