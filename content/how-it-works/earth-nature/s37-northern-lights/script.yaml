chapter: "S37 — What Causes the Northern Lights?"
slides:
  - n: 1
    narration: "दोस्तों, सोचो एक ऐसी रात जहाँ पूरा आसमान हरे, गुलाबी और बैंगनी रंगों से जगमगा उठे, जैसे कोई जादुई परदा हवा में लहरा रहा हो। इन्हें कहते हैं Northern Lights या Aurora. सदियों तक लोग समझते थे कि ये देवताओं की रोशनी है या किसी जादू का खेल। पर असल कहानी इससे भी ज़्यादा शानदार है, और ये जुड़ी है हमारे सूरज से! आज Katixo Shiksha पर हम जानेंगे कि ये रंगीन रोशनी आती कहाँ से है, और ये धरती के सिर्फ ठंडे इलाक़ों में ही क्यों दिखती है। चलो शुरू करें!"
  - n: 2
    narration: "इस पूरी कहानी का हीरो है हमारा सूरज, यानी Sun. सूरज सिर्फ रोशनी और गर्मी ही नहीं देता, बल्कि ये लगातार अंतरिक्ष में छोटे-छोटे charged particles भी फेंकता रहता है। इन्हें कहते हैं solar wind, यानी सौर हवा। ये particles मुख्य रूप से electrons और protons होते हैं और ये बहुत तेज़ रफ़्तार से चलते हैं, करीब 400 किलोमीटर प्रति सेकंड या उससे भी ज़्यादा! सोचो दोस्तों, इतनी तेज़ कि कुछ ही दिनों में सूरज से धरती तक पहुँच जाते हैं। यही particles auroras का असली कच्चा माल हैं।"
  - n: 3
    narration: "अब सवाल ये है कि जब इतने ख़तरनाक particles धरती की तरफ़ आते हैं, तो हम सुरक्षित कैसे रहते हैं? इसका जवाब है धरती का magnetic field, यानी चुंबकीय कवच। हमारी धरती के अंदर पिघला हुआ लोहा घूमता रहता है, जिससे पूरी धरती एक विशाल चुंबक की तरह बन जाती है। ये अदृश्य magnetic field हमें एक ढाल की तरह बचाता है। जब solar wind आती है, तो ये field उन ज़्यादातर particles को मोड़ देता है, इधर-उधर भगा देता है। अगर ये कवच ना होता दोस्तों, तो धरती पर जीवन शायद मुमकिन ही नहीं होता।"
  - n: 4
    narration: "अब आता है twist! धरती का magnetic field हर जगह बराबर नहीं है। ये North Pole और South Pole के पास कमज़ोर पड़ जाता है और वहाँ funnel यानी कीप जैसा रास्ता बना देता है। इसी कमज़ोर रास्ते से कुछ charged particles अंदर घुस आते हैं और सीधे ध्रुवों की तरफ़ खिंचे चले जाते हैं। यही वजह है दोस्तों कि auroras ज़्यादातर ध्रुवों के पास ही दिखती हैं, भारत जैसे देशों में नहीं। उत्तरी ध्रुव पर इन्हें कहते हैं Aurora Borealis और दक्षिणी ध्रुव पर Aurora Australis. दोनों एक ही खेल के दो रूप हैं।"
  - n: 5
    narration: "तो अब असली जादू समझो। जब ये तेज़ particles ध्रुवों के पास हमारी हवा यानी atmosphere में घुसते हैं, तो वो हवा के gas molecules से टकराते हैं। हमारी हवा में सबसे ज़्यादा होती है nitrogen और oxygen. जब solar particle किसी oxygen या nitrogen atom से टकराता है, तो वो उसे energy दे देता है। इस टक्कर से atom excited हो जाता है, यानी उत्तेजित। पर atom इस extra energy को ज़्यादा देर तक रोक नहीं पाता। और जब वो इस energy को छोड़ता है, तभी पैदा होती है वो खूबसूरत रोशनी। यही है aurora का असली राज़!"
  - n: 6
    narration: "अब जानो वो trick जिससे atom रोशनी बनाता है। जब excited atom शांत होता है, तो वो extra energy को light के रूप में बाहर फेंकता है। इसे कहते हैं emission of light. बिलकुल वैसे ही जैसे एक neon sign या tube light चमकती है। हर gas एक खास रंग की रोशनी छोड़ती है, ठीक उसकी अपनी पहचान की तरह। तो दोस्तों, ये रंग किसी पेंट से नहीं आते, बल्कि सीधे atoms से निकलते हैं। यही कारण है कि auroras के रंग हमेशा कुछ खास होते हैं, और हर रंग हमें बताता है कि वहाँ कौन सी gas चमक रही है।"
  - n: 7
    narration: "तो auroras में अलग-अलग रंग क्यों होते हैं? ये निर्भर करता है gas और ऊँचाई पर। Oxygen सबसे आम हरा रंग देती है, जो करीब 100 से 300 किलोमीटर की ऊँचाई पर बनता है, और यही सबसे ज़्यादा दिखने वाला रंग है। बहुत ज़्यादा ऊँचाई पर, करीब 300 किलोमीटर से ऊपर, oxygen एक दुर्लभ लाल यानी red रंग देती है। और nitrogen देती है नीले और बैंगनी, यानी blue और purple रंग, जो आमतौर पर नीचे की तरफ़ बनते हैं। तो दोस्तों, अगली बार aurora की फोटो देखो, तो रंग देखकर बता सकते हो कि कौन सी gas चमक रही थी!"
  - n: 8
    narration: "auroras की तीव्रता हमेशा एक जैसी नहीं रहती। कभी-कभी सूरज पर बहुत बड़े धमाके होते हैं, जिन्हें कहते हैं solar flares और coronal mass ejections. इनसे एक ही बार में अरबों टन charged particles अंतरिक्ष में फेंके जाते हैं। जब ये बड़ा तूफ़ान धरती से टकराता है, तो उसे कहते हैं geomagnetic storm. ऐसे समय auroras इतनी तेज़ हो जाती हैं कि वो सामान्य से कहीं नीचे, कम ऊँचाई वाले इलाक़ों में भी दिख सकती हैं। 1859 की एक बहुत बड़ी solar storm, जिसे Carrington Event कहते हैं, में auroras दुनिया भर में दिखी थीं!"
  - n: 9
    narration: "auroras देखने के लिए सबसे अच्छी जगहें हैं ध्रुवों के पास के देश, जैसे Norway, Iceland, Finland, Canada और Alaska. वहाँ लोग सर्दियों की लंबी और साफ़ रातों में आसमान की ओर ताकते हैं इस नज़ारे के लिए। पर सिर्फ उत्तरी ध्रुव ही नहीं, दक्षिणी ध्रुव यानी Antarctica और दक्षिणी New Zealand के पास भी Aurora Australis दिखती है। मज़े की बात ये है दोस्तों कि दूसरे ग्रहों पर भी auroras होती हैं! Jupiter और Saturn जैसे ग्रहों पर भी ये रंगीन रोशनी देखी गई है, क्योंकि उनके पास भी magnetic field और atmosphere है।"
  - n: 10
    narration: "तो चलो पूरी कहानी एक साँस में दोहराते हैं। सूरज से निकलती है solar wind, यानी charged particles. धरती का magnetic field उन्हें ढाल की तरह रोकता है, पर ध्रुवों के पास से कुछ अंदर घुस जाते हैं। वहाँ वो particles oxygen और nitrogen से टकराते हैं, उन्हें excited करते हैं, और जब atoms वो energy छोड़ते हैं, तो आसमान रंगों से भर जाता है। है ना कमाल की बात दोस्तों? आसमान का सबसे खूबसूरत शो असल में अंतरिक्ष की physics है, जो हमारे सिर के ऊपर खेली जा रही है। अब चलो तुम्हारा दिमाग test करते हैं!"
  - n: 11
    narration: "Quick brain check! दोस्तों, ध्यान से सोचो, तीन सवाल हैं। पहला, सूरज से निकलने वाली उस charged particles की धारा को क्या कहते हैं जो auroras की वजह बनती है? दूसरा, हमारी धरती कौन सी अदृश्य ढाल से इन particles से बचती है, और ये किसके पास कमज़ोर होती है? और तीसरा, auroras का सबसे आम हरा रंग किस gas से बनता है? अब video को pause करो, एक गहरी साँस लो, और अपने जवाब सोचो या copy में लिखो। हो गया? बहुत बढ़िया! चलो अगली slide पर सही जवाब देखते हैं।"
  - n: 12
    narration: "तो दोस्तों, जवाब मिलाने का समय! पहला जवाब, सूरज से निकलने वाली charged particles की धारा को कहते हैं solar wind. दूसरा जवाब, धरती हमें बचाती है अपने magnetic field से, जो North और South Pole यानी ध्रुवों के पास कमज़ोर पड़ती है, इसलिए वहीं auroras दिखती हैं। और तीसरा जवाब, auroras का आम हरा रंग बनता है oxygen gas से, करीब 100 से 300 किलोमीटर की ऊँचाई पर। अगर तुमने तीनों सही किए, ज़बरदस्त! तुम तो असली space scientist बनते जा रहे हो। चलो अब आख़िरी slide पर सब कुछ समेटते हैं।"
  - n: 13
    narration: "तो आज हमने सीखा कि northern lights कोई जादू नहीं, बल्कि शानदार science है। सूरज की solar wind, धरती का magnetic field, और हवा के atoms, इन तीनों का मेल ही आसमान में वो रंगीन परदा बनाता है। हरा रंग oxygen से, लाल भी oxygen से ऊँचाई पर, और नीला-बैंगनी nitrogen से। उम्मीद है दोस्तों, अब जब भी तुम aurora की तस्वीर देखोगे, तुम्हें पूरी science याद आएगी। अगले episode में हम एक मज़ेदार सवाल हल करेंगे, soda की बोतल खोलते ही वो fizz यानी बुलबुले क्यों फूटते हैं? Subscribe करना मत भूलना! Bye!"
