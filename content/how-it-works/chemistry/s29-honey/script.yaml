- n: 13
  narration: जवाब का समय! पहला, honey में पानी सिर्फ लगभग 17 से 18 percent होता है, और शक्कर लगभग 80 percent, यानी बहुत कम पानी और बहुत ज़्यादा शक्कर। दूसरा, वो process है osmosis, जिसमें honey की ज़्यादा शक्कर bacteria के शरीर का पानी बाहर खींच लेती है और उसे सुखाकर मार देती है। तीसरा, वो enzyme है glucose oxidase, जो मधुमक्खी मिलाती है और जो honey में natural hydrogen peroxide बनाता है। सब सही? शाबाश दोस्तों!
  visual_prompt: Three answer cards with green checkmarks. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 14
  narration: तो दोस्तों, आज हमने सीखा कि honey कभी खराब नहीं होता क्योंकि उसके पास चार दमदार हथियार हैं, बहुत कम पानी, osmosis, खट्टापन यानी acidity, और natural hydrogen peroxide। यही वजह है कि 3000 साल पुराना शहद भी खाने लायक रहता है! बस उसे नमी से बचाकर रखना, और crystallize होने पर घबराना मत। प्रकृति का यह सुनहरा चमत्कार chemistry और मधुमक्खी की मेहनत का नतीजा है। अगले episode में हम जानेंगे, passwords और encryption हमारे राज़ कैसे सुरक्षित रखते हैं? Subscribe करना मत भूलना! Bye!
