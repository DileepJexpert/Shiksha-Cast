  narration: Quick brain check! दोस्तों, तीन सवाल हैं, ध्यान से सोचो। पहला, soda में बुलबुले किस गैस के बनते हैं, और उस गैस को drink में घोलने की process को क्या कहते हैं? दूसरा, बोतल खोलते ही गैस बाहर क्यों भागती है, यानी अचानक क्या बदलता है? और तीसरा, glass में बुलबुले जिन खास खुरदरी जगहों से उठते हैं, उन्हें क्या कहते हैं? अब video pause करो, सोचो, और अपने जवाब मन में या copy में लिखो। तैयार हो? बहुत बढ़िया! चलो अगली slide पर सही जवाब देखते हैं।
