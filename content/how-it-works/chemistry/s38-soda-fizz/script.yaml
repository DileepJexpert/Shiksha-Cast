  narration: तो आज हमने सीखा, soda का fizz कोई जादू नहीं, बल्कि pressure और gas की शानदार science है। CO2 गैस high pressure में घोली जाती है, बोतल खोलने पर दबाव गिरता है, और गैस बुलबुले बनकर nucleation sites से बाहर भागती है। Mentos fountain, flat soda, सब इसी एक नियम से समझ आ जाता है। उम्मीद है दोस्तों, अब अगली बार छस्स सुनकर तुम मुस्कुराओगे, क्योंकि तुम्हें पूरी science पता है! अगले episode में हम जानेंगे एक ज़बरदस्त सवाल, vaccines हमारे शरीर को बीमारी से लड़ना कैसे सिखाते हैं? Subscribe करना मत भूलना! Bye!
