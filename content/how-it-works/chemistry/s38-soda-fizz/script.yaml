  narration: तो दोस्तों, जवाब मिलाते हैं! पहला जवाब, soda के बुलबुले बनते हैं carbon dioxide यानी CO2 गैस से, और उसे घोलने की process को कहते हैं carbonation. दूसरा जवाब, बोतल खोलते ही अंदर का pressure यानी दबाव अचानक गिर जाता है, इसलिए पानी ज़्यादा गैस रोक नहीं पाता और वो बुलबुले बनकर बाहर निकलती है। और तीसरा जवाब, वो खुरदरी जगहें जहाँ से बुलबुले जन्म लेते हैं, उन्हें कहते हैं nucleation sites. अगर तीनों सही हुए, शाबाश दोस्तों! तुम तो असली science detective बन गए। चलो आख़िरी slide पर चलें।
