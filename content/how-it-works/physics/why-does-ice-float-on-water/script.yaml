chapter: Ice ke Aage Ki Baat
slides:
- n: 1
  narration: Kya aapne kabhi socha hai ki ice paani mein float karti hai? Kyunki hum sab jaante hain ki
    solid aam taur par paani ke niche hota hai, lekin ice nahin. Aaj hum is mystery ko solve karenge!
  visual_prompt: A cartoon of a block of ice and a glass of water with ice floating on top
- n: 2
  narration: Ice float karti hai kyunki uski density paani ki density se kam hoti hai. Toh kya hota hai?
    Aapko lagta hai ki ye galti ho sakti hai, lekin yeh sach hai! Ab hum dekhte hain ice ke particle kyun
    aise hote hain
  visual_prompt: A diagram of water molecules and ice crystal structures side by side
- n: 3
  narration: Ice ke particles, jo ki hydrogen aur oxygen ke atom hote hain, ek samay mein paani ke particle
    se kam jatil hota hai. Isliye, when ice in paani mein daalta hai, ve paani ke particle ke saath milkar
    block bante hain
  visual_prompt: An animation of water molecules moving and rearranging into a crystalline structure
- n: 4
  narration: Yehi wajah hai ki ice float karti hai. Yadi iski density paani ki density se adhik hoti,
    toh ve pighal jate. Lekin yeh sach hai, aapko lagta hai!
  visual_prompt: A picture of a glass with water and ice cubes floating on top
- n: 5
  narration: Is mystery ko solve karne ke liye humne kuchh ghatnaon ka pata lagaaya, jaise ki temperature
    aur pressure par ice ki density ka asar
  visual_prompt: A graph showing the relationship between temperature and ice's density
- n: 6
  narration: Toh aap jaante hain ab! Ice float karti hai kyunki uski density paani ki density se kam hoti
    hai. Dhanyavaad aapka samay dena. Agar aapko yeh jankari pasand aayi, toh zarur hamare channel ko
    subscribe karen aur ek naya video dekhne ke liye hamara bell icon press karein!
  visual_prompt: A playful animation of a smiley face made from ice cubes and water droplets
