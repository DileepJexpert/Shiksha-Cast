chapter: S23 — Rainbow आसमान में कैसे बनता है?
slides:
- n: 1
  narration: दोस्तों, बारिश के बाद अचानक आसमान में सात रंगों की एक खूबसूरत कमान दिखती है, rainbow! लेकिन क्या तुमने कभी सोचा है, वो रंग आते कहाँ से हैं? आसमान में तो कोई रंगों का डिब्बा नहीं रखा! सच तो ये है कि वो सारे रंग पहले से सूरज की सफ़ेद रोशनी के अंदर छुपे होते हैं, और पानी की बूंदें बस उन्हें बाहर निकाल देती हैं! आज Katixo KhojLab पर हम जानेंगे कि rainbow कैसे बनता है, सात रंग किस क्रम में आते हैं, और तुम खुद घर पर rainbow कैसे बना सकते हो. चलो शुरू करें!
  visual_prompt: A vivid rainbow arcing over rain clouds after a storm, a teen looking up in awe.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 2
  narration: सबसे पहले एक चौंकाने वाली बात, दोस्तों. सूरज की रोशनी जो हमें सफ़ेद दिखती है, असल में सफ़ेद है ही नहीं! वो असल में कई रंगों का मिश्रण है, बैंगनी, नीला, हरा, पीला, नारंगी और लाल, सब एक साथ मिले हुए. इसे सबसे पहले महान scientist Isaac Newton ने साबित किया था. जब ये सारे रंग आपस में मिलते हैं, तो हमारी आँखों को मिलकर सफ़ेद दिखते हैं. यानी सूरज की हर किरण में एक छुपा हुआ rainbow मौजूद है, बस उसे बाहर लाने के लिए सही चीज़ चाहिए, और वो चीज़ है पानी की बूंद!
  visual_prompt: A beam of white sunlight labeled, hiding seven colours inside, Newton portrait accent.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 3
  narration: अब समझो असली जादू, दोस्तों, जिसका नाम है refraction यानी अपवर्तन. जब रोशनी एक माध्यम से दूसरे में जाती है, जैसे हवा से पानी में, तो वो थोड़ी मुड़ जाती है, क्योंकि पानी में रोशनी की रफ़्तार धीमी हो जाती है. कमाल की बात ये है कि हर रंग अलग-अलग मात्रा में मुड़ता है! बैंगनी रंग सबसे ज़्यादा मुड़ता है और लाल रंग सबसे कम. इसी अलग-अलग मुड़ने की वजह से रंग आपस में अलग हो जाते हैं, और एक से सात रंग बन जाते हैं. इसी को dispersion यानी रंगों का बिखरना कहते हैं!
  visual_prompt: A light ray bending as it passes from air into water, with each colour bending a different amount.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 4
  narration: अब पूरी कहानी एक बूंद के अंदर, दोस्तों. जब सूरज की किरण एक पानी की बूंद में घुसती है, तो तीन चीज़ें होती हैं. पहला, बूंद में घुसते वक़्त रोशनी मुड़ती है, refraction. दूसरा, बूंद के पिछले हिस्से से टकराकर रोशनी वापस लौटती है, इसे reflection यानी परावर्तन कहते हैं. और तीसरा, बूंद से बाहर निकलते वक़्त फिर से मुड़ती है. इन तीन steps में रंग पूरी तरह अलग होकर बाहर निकलते हैं. यानी हर एक छोटी बूंद, एक mini prism की तरह काम करती है! लाखों बूंदें मिलकर पूरा rainbow बनाती हैं.
  visual_prompt: A large raindrop cross-section showing refraction in, reflection at the back, refraction out, colours fanning.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 5
  narration: अब एक मज़ेदार बात, दोस्तों, rainbow देखने के लिए एक खास position चाहिए. rainbow तभी दिखता है जब सूरज तुम्हारे पीछे हो और बारिश या पानी की बूंदें तुम्हारे सामने. यानी तुम हमेशा सूरज से उल्टी दिशा में देख रहे होते हो. इसीलिए rainbow ज़्यादातर सुबह या शाम को दिखता है, जब सूरज नीचे होता है. एक और रोचक बात, हर इंसान को थोड़ा अलग rainbow दिखता है! क्योंकि वो तुम्हारी आँखों तक पहुँचने वाली खास किरणों से बनता है, तुम्हारा rainbow सिर्फ़ तुम्हारा होता है, दोस्तों!
  visual_prompt: A figure with the sun behind and rain in front, dotted lines showing the viewing angle to the rainbow.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 6
  narration: अब सात रंगों का राज़, दोस्तों. rainbow में रंग हमेशा एक ही क्रम में आते हैं, ऊपर से लाल, फिर नारंगी, पीला, हरा, नीला, गहरा नीला, और सबसे नीचे बैंगनी. इसे याद रखने का एक आसान तरीका है, VIBGYOR! ये अंग्रेज़ी के सात रंगों के पहले अक्षर हैं. ये क्रम कभी नहीं बदलता, क्योंकि हर रंग की मुड़ने की मात्रा तय है. लाल सबसे कम मुड़ता है इसलिए ऊपर दिखता है, और बैंगनी सबसे ज़्यादा मुड़ता है इसलिए सबसे नीचे. Science में कितनी सुंदर व्यवस्था है ना!
  visual_prompt: A clean rainbow band labeled top-to-bottom Red to Violet with the word VIBGYOR.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 7
  narration: क्या तुम्हें पता है, दोस्तों, कभी-कभी एक साथ दो rainbow भी दिखते हैं? इसे double rainbow कहते हैं. ऐसा तब होता है जब रोशनी पानी की बूंद के अंदर एक बार नहीं, बल्कि दो बार reflect होती है. दूसरा rainbow पहले से हल्का होता है, और सबसे मज़ेदार बात, उसके रंग उल्टे क्रम में होते हैं! यानी ऊपर बैंगनी और नीचे लाल. दोनों rainbow के बीच का हिस्सा थोड़ा गहरा दिखता है, जिसे Alexander's band कहते हैं. कुदरत का ये नज़ारा वाकई किसी जादू से कम नहीं!
  visual_prompt: Two stacked rainbows, the outer one fainter with reversed colours, dark Alexander's band between.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 8
  narration: अब एक दिलचस्प सच, दोस्तों, rainbow असल में पूरा गोल यानी circle होता है! हमें ज़मीन पर सिर्फ़ ऊपर का आधा हिस्सा, यानी एक arc दिखता है, क्योंकि ज़मीन नीचे का हिस्सा छुपा देती है. लेकिन अगर तुम किसी ऊँची जगह से, या हवाई जहाज़ से देखो, तो कभी-कभी पूरा गोल rainbow दिख सकता है! साथ ही, rainbow की कोई fixed जगह नहीं होती, तुम उसके पास कभी पहुँच नहीं सकते, क्योंकि जैसे-जैसे तुम चलते हो, बूंदें और angle बदल जाते हैं और rainbow भी आगे खिसक जाता है.
  visual_prompt: A full circular rainbow seen from a plane window, with ground cutting off the lower half on a second view.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 9
  narration: अब सबसे मज़ेदार हिस्सा, दोस्तों, तुम खुद घर पर rainbow बना सकते हो! एक धूप वाले दिन, बाहर खड़े होकर सूरज को पीठ पीछे रखो, और एक पानी की पाइप या spray bottle से हवा में बारीक पानी छिड़को. तुम्हें छोटा सा rainbow दिखेगा! या फिर एक glass पानी में रखकर खिड़की की धूप में रखो, और पीछे सफ़ेद कागज़ रखो, रंग बिखर कर दिखेंगे. एक CD या DVD को रोशनी में घुमाओ, उस पर भी rainbow जैसे रंग दिखते हैं! Science को महसूस करने का इससे मज़ेदार तरीका और क्या होगा?
  visual_prompt: A kid spraying a water hose mist with sun behind, a small rainbow appearing; CD reflecting colours inset.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 10
  narration: तो एक quick recap, दोस्तों. सूरज की सफ़ेद रोशनी असल में सात रंगों का मिश्रण है. जब ये रोशनी पानी की बूंद में जाती है, तो refraction, reflection, और फिर refraction से रंग अलग हो जाते हैं, यानी dispersion. हर बूंद एक छोटे prism की तरह काम करती है. रंगों का क्रम हमेशा VIBGYOR रहता है, और rainbow देखने के लिए सूरज पीछे और बूंदें सामने होनी चाहिए. अगली बार बारिश के बाद rainbow देखो, तो याद रखना, तुम सूरज की रोशनी का असली रूप देख रहे हो!
  visual_prompt: 'Four mini-icons: white beam, bending ray, raindrop prism, VIBGYOR band.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text'
- n: 11
  narration: अब समय है Quick brain check का, दोस्तों! तीन सवाल, और तुम्हें खुद जवाब सोचना है. पहला, सफ़ेद रोशनी का अलग-अलग रंगों में बिखरना क्या कहलाता है? दूसरा, rainbow में रंगों का सही क्रम याद रखने वाला short word कौन सा है? और तीसरा, rainbow देखने के लिए सूरज तुम्हारे किस तरफ़ होना चाहिए, आगे या पीछे? अब video को pause करो, थोड़ा दिमाग़ लगाओ, और तीनों जवाब बोलकर देखो. तैयार हो? चलो जवाब मिलाते हैं अगली slide पर!
  visual_prompt: A glowing brain with three rainbow-coloured question marks and a pause-button prompt.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text
- n: 12
  narration: चलो दोस्तों, अब जवाब मिलाते हैं! पहला जवाब, सफ़ेद रोशनी का अलग-अलग रंगों में बिखरना dispersion कहलाता है, जो refraction की वजह से होता है. दूसरा जवाब, रंगों का क्रम याद रखने वाला word है VIBGYOR, यानी बैंगनी से लाल तक के सात रंग. और तीसरा जवाब, rainbow देखने के लिए सूरज हमेशा तुम्हारे पीछे और बारिश की बूंदें सामने होनी चाहिए. कितने सही हुए? अगर तीनों सही, तो शाबाश, तुम तो असली rainbow scientist बन गए हो!
  visual_prompt: 'Three answer cards revealing: Dispersion, VIBGYOR, Sun Behind You.. Educational science illustration for a teen audience, dark navy background, neon cyan and purple accents, clean vector diagram style, high detail, no text'
- n: 13
  narration: तो दोस्तों, आज हमने जाना कि rainbow कोई जादू नहीं, बल्कि सूरज की रोशनी और पानी की बूंदों का शानदार खेल है, जहाँ refraction, reflection, और dispersion मिलकर सात रंग बनाते हैं. और सबसे अच्छी बात, तुम इसे घर पर खुद भी बना सकते हो! अगले episode में हम एक मज़ेदार सवाल का जवाब ढूंढेंगे, हमें hiccups यानी हिचकी आख़िर क्यों आती है? बहुत interesting रहने वाला है. Subscribe करना मत भूलना! Bye!
