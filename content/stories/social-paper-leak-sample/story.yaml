    place:
      journalist: left
      officer: right
    dialogue:
      - who: journalist
        text: "Sir, yeh list aur call records saboot ho sakte hain."
      - who: officer
        text: "Investigation turant shuru hogi. Jo bhi zimmedar hoga, bach nahi payega."

  - id: s4_public_message
    place:
      ravi: left
      officer: center
      netaji: right
    dialogue:
      - who: netaji
        text: "Hum jaanch ka swagat karte hain. Public ko sach milna chahiye."
      - who: officer
        text: "Sirf statement nahi, action chahiye. Paper leak bachchon ke sapne todta hai."
      - who: ravi
        text: "Aaj mujhe samajh aaya. Chup rehna bhi galat ko himmat deta hai."
