chapter: "Ch 6 — House of Hundreds – I"
slides:
  - n: 1
    narration: "Hello everyone, and welcome back to Katixo Shiksha! Today we're starting a super fun chapter called House of Hundreds. Here's a cool idea — every big number has its own house, and inside that house there are three little rooms! Today we'll step inside the house of 3-digit numbers and meet the three rooms — hundreds, tens, and ones. I'm Mela, your guide. So chalo, let's go inside!"
  - n: 2
    narration: "So what will we learn today? Four exciting things. Number one — how to read and write 3-digit numbers, all the way from 100 to 999. Number two — place value, which means figuring out which room each digit lives in. Number three — expanded form, like stretching the number 357 out into its parts. And number four — number names, learning to say and write numbers in words. Sounds like a lot? Don't worry, we'll do it step by step!"
  - n: 3
    narration: "Here's the big idea — think of a number as a house. Every 3-digit number is a house with three rooms inside. The first room is for Hundreds, the second room is for Tens, and the third room is for Ones. Now here's the magic part — each digit lives in its own room. And if a digit changes its room, the whole number changes! Interesting, na? Let's see how this works with a real number."
  - n: 4
    narration: "Let's take the number 357. Now let's look inside its house. In the Hundreds room, we have the digit 3. In the Tens room, we have the digit 5. And in the Ones room, we have the digit 7. See? Every digit is sitting in its own room, in its own place. This idea — that each digit has a place and a room — is exactly what we call place value. Simple, right?"
  - n: 5
    narration: "Now let's build the number 357 using blocks, so we can really see it. First, the big square blocks called flats — each flat is one hundred. We take three flats, so that's three hundreds. Next, the long blocks called rods — each rod is ten. We take five rods, so that's five tens. And finally, the tiny blocks called units — each unit is one. We take seven units, that's seven ones. Put them all together, and what do we get? 357! You just built a number with blocks."
  - n: 6
    narration: "Now here comes a little bit of maths magic — it's called expanded form. Expanded form just means stretching the number out to show what each digit is really worth. In 357, the 3 is in the hundreds room, so it's worth 300. The 5 is in the tens room, so it's worth 50. And the 7 is in the ones room, so it's worth 7. So we write it like this — 357 equals 300 plus 50 plus 7. Each digit's value comes from its room. Beautiful, isn't it?"
  - n: 7
    narration: "Let's try one together. Can you expand the number 482? Let's check the rooms one by one. The 4 is in the hundreds room, so it's worth 400. The 8 is in the tens room, so it's worth 80. And the 2 is in the ones room, so it's worth just 2. Put it together — 482 equals 400 plus 80 plus 2. See how easy that was? Just look at the room, and you know the value!"
  - n: 8
    narration: "Now let's learn how to write a number's name. Take the number 624. First, let's expand it — 600 plus 20 plus 4. Now reading it out is easy — six hundred twenty-four. In Hindi we'd say chhe sau chaubees, but since we're learning English number names, we say six hundred twenty-four. Notice how expanded form helps us — once you know the parts, writing the full name becomes really simple."
  - n: 9
    narration: "Okay, now a very important warning — please don't make this common mistake! Look at 357 again. Many students think the 5 just means five. But no! The 5 is sitting in the tens room, so its real value is fifty, not five. The digit and its value are different things! And one more thing — never ignore zero. In the number 408, the tens room has a zero. That zero might look empty, but it's holding its place. Without it, 408 would become 48 — a totally different number!"
  - n: 10
    narration: "Alright, now it's your turn! Pause the video and try these three questions. Question one — in the number 596, what are the hundreds, tens, and ones? Question two — what is the expanded form of 273? And question three — in the number 305, what is the value of the tens digit? Take your time, grab a pencil, write your answers down. Pause now, give it a try, and then press play to check!"
  - n: 11
    narration: "Ready to check your answers? Let's go! Question one — in 596, the hundreds is 5, the tens is 9, and the ones is 6. Question two — 273 expands to 200 plus 70 plus 3. And question three — in 305, the value of the tens digit is zero, because there's a zero sitting in the tens room! How many did you get right? If you got even one, give yourself a clap. Shabaash, well done!"
  - n: 12
    narration: "Let's quickly recap everything we learned today. First — every 3-digit number is a house with three rooms — hundreds, tens, and ones. Second — expanded form lets us stretch a number out, like 357 equals 300 plus 50 plus 7. And third — a digit's value depends on its room, so a 5 in the tens room is worth fifty. You've now explored every room in the house of hundreds. I'm so proud of you!"
  - n: 13
    narration: "Before you go, here's a fun challenge to do at home. Think of any 3-digit number from your life — maybe your building number, or a bus number you see every day. Write down its hundreds, tens, and ones. Then make its expanded form, and say its name out loud, like four hundred fifty-six! Drop your number and its name in the comments — I'd love to see them. The worksheet is in the description. And next time, we've got Chapter 7 — Raksha Bandhan! Don't forget to subscribe. Bye bye, see you soon!"
