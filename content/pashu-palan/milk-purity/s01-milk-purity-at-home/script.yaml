chapter: S01 — How to Check Milk Purity at Home
slides:
  - n: 1
    narration: >-
      Namaste dosto! Aaj hum seekhenge ki ghar par milk purity ko kaise samjhein. Kya doodh clean hai? Kya usme paani mix hone ka doubt hai? Kya smell, color, boiling aur lactometer se kuch basic clue mil sakta hai? Dhyaan rahe, home checks final proof nahi hote. Final confirmation ke liye lab test best hota hai. Lekin daily life me ye basic checks aapko better decision lene me help karte hain.
    visual_prompt: >-
      Indian rural dairy kitchen and small milk testing table, steel milk can, glass of milk, lactometer, clean modern educational style, warm green and cream color palette, high detail, no readable text

  - n: 2
    narration: >-
      Sabse pehle samjhiye, pure milk ka matlab sirf white color nahi hota. Achha milk clean hota hai, fresh smell deta hai, natural fat aur SNF balance rakhta hai, aur hygienic tarike se collect aur store hota hai. Agar doodh safed dikhta hai, iska matlab ye guarantee nahi hai ki quality perfect hai. Milk purity me three cheezein important hain: cleanliness, natural composition, aur safe handling.
    visual_prompt: >-
      Three part infographic concept showing clean milk, natural fat and SNF, safe handling from cow to container, Indian dairy education illustration, green and cream theme, no readable text

  - n: 3
    narration: >-
      Doodh ki quality farm se start hoti hai. Agar animal healthy routine me hai, udder aur hands clean hain, vessel clean hai, aur doodh jaldi thanda ya boil kiya gaya hai, to quality better rahegi. Ganda bucket, khula container, dust, flies, ya late storage se milk quality kharab ho sakti hai. Isliye purity sirf test se nahi, process se bhi aati hai.
    visual_prompt: >-
      Clean milking process at small Indian dairy farm, farmer washing hands, clean steel bucket, cow shed kept tidy, flies avoided, educational rural style, no readable text

  - n: 4
    narration: >-
      Home level par first check hai smell aur appearance. Fresh milk ki smell mild aur natural hoti hai. Agar smell sour, chemical-like, ya unusual lage, to caution rakhein. Color normal creamy white hota hai. Bahut watery look, bahut zyada foam, ya bottom me dirt particles dikhein to quality doubt ho sakta hai. Lekin sirf smell aur color se final decision nahi lena chahiye.
    visual_prompt: >-
      Close-up of milk in transparent glass, person checking smell and appearance, side visual of clean milk versus doubtful milk, educational comparison, no readable text

  - n: 5
    narration: >-
      Second simple check hai sediment check. Ek clean white cloth ya fine strainer se thoda doodh filter karke dekhiye. Agar cloth par dust, hair, insects, ya dirt particles reh jaate hain, to handling hygienic nahi thi. Ye test paani mixing prove nahi karta, but ye bata sakta hai ki collection aur storage clean tha ya nahi.
    visual_prompt: >-
      Milk being filtered through clean white cloth into steel vessel, small visible dirt particles shown separately as warning concept, Indian home dairy setting, no readable text

  - n: 6
    narration: >-
      Third check hai boiling behavior. Normal milk boil hone par cream layer banata hai aur smell natural rehti hai. Agar boil karte waqt smell unusual ho, texture strange lage, ya milk jaldi phat jaye, to freshness ya handling issue ho sakta hai. Lekin yaad rakhiye, milk ka phatna acidity, old milk, temperature aur storage se bhi ho sakta hai. Isliye isko sirf clue samjhein, final proof nahi.
    visual_prompt: >-
      Milk boiling in steel pan, cream layer forming, small warning icons for unusual smell and curdling, safe educational kitchen illustration, no readable text

  - n: 7
    narration: >-
      Ab aate hain lactometer par. Lactometer ek simple instrument hai jo milk ki density batata hai. Agar doodh me paani zyada mix ho, to density change ho sakti hai. Lekin lactometer reading ko temperature ke saath samajhna zaroori hai. Bahut thanda ya bahut garam milk galat reading de sakta hai. Isliye reading ko proper temperature par lena chahiye.
    visual_prompt: >-
      Lactometer floating in tall glass cylinder filled with milk, thermometer beside it, Indian dairy testing table, clean educational diagram style, no readable text

  - n: 8
    narration: >-
      Lactometer use karne ka basic method: milk ko clean cylinder me dalo, foam settle hone do, lactometer gently chhodo, aur reading eye level par dekho. Reading likho, temperature note karo, aur dairy standard chart se compare karo. Agar reading repeatedly unusual aa rahi hai, to milk sample ko lab me test karwana better hai.
    visual_prompt: >-
      Step by step lactometer use: pour milk, settle foam, float lactometer, eye-level reading, note temperature, educational sequence with icons, no readable text

  - n: 9
    narration: >-
      Fat aur SNF bhi important terms hain. Fat se milk ki richness aur cream decide hoti hai. SNF ka matlab solids-not-fat: protein, lactose, minerals jaise natural solids. Cow milk aur buffalo milk ke fat-SNF values alag ho sakte hain. Agar aap dairy business kar rahe hain, to fat aur SNF testing machine ya reliable collection center reading useful hoti hai.
    visual_prompt: >-
      Educational dairy composition graphic showing milk glass splitting into fat cream layer and solids-not-fat components, cow and buffalo icons, Indian rural business style, no readable text

  - n: 10
    narration: >-
      Ghar par kuch checks useful hain, lekin limitation samajhna bahut important hai. Smell, sediment, boiling aur lactometer basic screening dete hain. Lekin exact water percentage, fat, SNF, microbial quality, ya other quality issues ke liye proper lab or certified testing method hi reliable hai. Agar milk sell ya purchase business scale par kar rahe hain, then regular testing system zaroori hai.
    visual_prompt: >-
      Split screen: home checks on left, professional milk testing lab on right, clear hierarchy from screening to confirmation, educational dairy infographic style, no readable text

  - n: 11
    narration: >-
      Buyer checklist yaad rakhiye. Milk source reliable ho. Container clean ho. Smell natural ho. Sediment na ho. Doodh jaldi boil ya chill kiya gaya ho. Lactometer reading regularly normal range me ho. Aur seller transparent ho. Agar aap farmer hain, to clean milking aur clean storage aapke milk ka trust badhata hai.
    visual_prompt: >-
      Indian family buying milk from local dairy farmer, checklist icons around clean container, natural smell, no dirt, proper storage, trust, rural friendly style, no readable text

  - n: 12
    narration: >-
      Recap: milk purity ko samajhne ke liye color par blind trust mat kijiye. Smell check kijiye, sediment check kijiye, boiling behavior dekhiye, lactometer se density clue lijiye, fat-SNF ko samjhiye, aur final proof ke liye lab testing ko importance dijiye. Next video me hum seekhenge: fat aur SNF kya hota hai, aur dairy farmer ke payment me iska role kya hai. Channel ko subscribe kijiye — Katixo Pashu Palan par practical dairy knowledge simple Hinglish me.
    visual_prompt: >-
      Recap board with milk purity icons: smell, filter, boil, lactometer, fat-SNF, lab test, Indian dairy education ending slide, warm green and cream theme, no readable text
