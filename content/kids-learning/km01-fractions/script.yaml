chapter: "KM01 — Fractions (bhinn) kya hote hain?"
slides:
  - n: 1
    narration: "Hello बच्चों! Katixo KhojLab mein तुम्हारा स्वागत है! आज हम एक मज़ेदार चीज़ सीखेंगे जिसका नाम है fractions, यानी हिंदी में bhinn. सोचो तुम्हारे पास एक pizza है और तुम्हें उसे अपने दोस्तों के साथ बाँटना है. जब हम किसी चीज़ को बराबर हिस्सों में बाँटते हैं, तो हर हिस्से को fraction कहते हैं. तो चलो, pizza और chocolate के साथ इस खोज पर निकलते हैं!"
  - n: 2
    narration: "बच्चों, सबसे पहले समझो fraction का मतलब क्या है. Fraction यानी किसी पूरी चीज़ का एक बराबर हिस्सा. जैसे एक पूरा chocolate bar है, और तुमने उसे चार बराबर टुकड़ों में तोड़ा. अब हर एक टुकड़ा है chocolate का एक-चौथाई हिस्सा. ध्यान रखो, हिस्से बराबर होने चाहिए, छोटे-बड़े नहीं! जब हिस्से बराबर हों, तभी हम उसे सही fraction कह सकते हैं. है ना आसान?"
  - n: 3
    narration: "अब एक fraction लिखते कैसे हैं? हर fraction में दो numbers होते हैं, ऊपर और नीचे, बीच में एक line. नीचे वाले number को denominator कहते हैं, यह बताता है कि पूरी चीज़ कितने बराबर हिस्सों में बँटी है. ऊपर वाले number को numerator कहते हैं, यह बताता है कि हमने कितने हिस्से लिए. जैसे एक pizza के 8 बराबर slice हैं और तुमने 3 खाए, तो तुमने 3 बटा 8 pizza खाया."
  - n: 4
    narration: "चलो pizza के साथ एक पहला worked example करते हैं. एक pizza को 4 बराबर slices में काटा. तुमने उसमें से 1 slice उठाया. तो तुम्हारे पास है 1 बटा 4, यानी one-fourth pizza. नीचे 4 क्योंकि कुल 4 slices थे, ऊपर 1 क्योंकि तुमने 1 slice लिया. इसे हम बोलते हैं ek-chauthai. देखो कितना आसान है, बस गिनो कुल हिस्से और लिए हुए हिस्से!"
  - n: 5
    narration: "अब दूसरा example chocolate से. एक chocolate bar के 6 बराबर टुकड़े हैं. तुमने अपनी छोटी बहन को 2 टुकड़े दिए. तो उसके पास आया 2 बटा 6 chocolate. और तुम्हारे पास बचे 4 टुकड़े, यानी 4 बटा 6. ध्यान दो, 2 बटा 6 और 4 बटा 6 मिलाकर पूरा 6 बटा 6 बनता है, यानी पूरी chocolate! जब numerator और denominator बराबर हों, तो वो पूरी चीज़ होती है."
  - n: 6
    narration: "तीसरा example एक रोटी से. माँ ने एक रोटी बनाई और उसे 2 बराबर हिस्सों में तोड़ा. एक हिस्सा है आधा, यानी 1 बटा 2, जिसे हम बोलते हैं aadha या half. अगर रोटी को 3 बराबर हिस्सों में तोड़ें तो हर हिस्सा है 1 बटा 3, यानी ek-tihai. जितने ज़्यादा हिस्से करोगे, हर हिस्सा उतना ही छोटा होगा. बड़ा denominator मतलब छोटा टुकड़ा!"
  - n: 7
    narration: "एक मज़ेदार बात समझो बच्चों. 1 बटा 2 और 2 बटा 4, दोनों एक जैसे होते हैं! कैसे? सोचो एक pizza को 2 हिस्से करो और 1 लो, या उसी pizza को 4 हिस्से करो और 2 लो. दोनों बार तुम्हारे पास आधा pizza ही है! ऐसे fractions को equal fractions कहते हैं. एक ही चीज़ को अलग-अलग तरीके से दिखा सकते हैं, मज़ा आ गया ना?"
  - n: 8
    narration: "अब बारी है तुम्हारी! चलो try करें. मैं तुम्हें कुछ सवाल देता हूँ, video को pause करो और copy-pen लेकर हल करो. सवाल एक, एक pizza के 8 slices हैं, तुमने 5 खाए, तो fraction क्या होगा? सवाल दो, एक chocolate के 10 टुकड़े हैं, 3 दोस्त को दिए, fraction क्या है? सवाल तीन, 6 marbles में से 2 लाल हैं, लाल marbles का fraction क्या है? सोचो!"
  - n: 9
    narration: "क्या तुमने try किया? बहुत बढ़िया! अब चलो answers देखते हैं. पहले सवाल का जवाब, 8 slices में से 5 खाए, तो 5 बटा 8. दूसरे सवाल का जवाब, 10 टुकड़ों में से 3 दिए, तो 3 बटा 10. तीसरे सवाल का जवाब, 6 marbles में से 2 लाल, तो 2 बटा 6. अगर तुम्हारे जवाब सही हैं, तो shabaash! अगर नहीं, कोई बात नहीं, फिर से देखो और समझो."
  - n: 10
    narration: "बच्चों, fractions हमारी रोज़ की ज़िंदगी में हर जगह हैं! जब माँ कहती हैं आधा गिलास दूध पियो, वो fraction है. जब घड़ी में आधा घंटा बोलते हैं, वो भी fraction है. जब तुम pizza, cake या chocolate बाँटते हो, तब तुम fractions ही use करते हो. तो fractions कोई मुश्किल चीज़ नहीं, यह तो रोज़ काम आने वाली एक प्यारी सी skill है!"
  - n: 11
    narration: "चलो अब quick recap करते हैं. एक, fraction यानी किसी पूरी चीज़ का बराबर हिस्सा. दो, नीचे वाला number denominator बताता है कुल हिस्से. तीन, ऊपर वाला number numerator बताता है लिए हुए हिस्से. चार, बड़ा denominator मतलब छोटा टुकड़ा. पाँच, 1 बटा 2 और 2 बटा 4 जैसे equal fractions एक जैसे होते हैं. बस, इतना याद रखो और तुम fractions के master बन जाओगे!"
  - n: 12
    narration: "Shabaash बच्चों! आज तुमने fractions यानी bhinn सीख लिए, pizza, chocolate और marbles के साथ! अब घर पर अपनी माँ से एक चीज़ बाँटने को कहो और उसका fraction बताओ. ऐसी और masti-bhari learning के लिए Katixo KhojLab subscribe करो, bell का button दबाओ, और अगले मज़ेदार episode में फिर मिलेंगे. खूब पढ़ो, खूब खेलो, bye-bye!"
