chapter: Class 4 Science - Water, Weather and Environment
slides:
- n: 1
  narration: >-
    Water is needed by people, plants, and animals. We use water for drinking, cooking,
    cleaning, farming, and many other activities. Although Earth has a lot of water, clean
    drinking water is limited, so we must use it wisely.
  visual_prompt: >-
    water drop with people plants animals
  motion: kenburns
- n: 2
  narration: >-
    We get water from rain, rivers, lakes, ponds, wells, springs, and underground water. In
    cities, water may come through pipes after treatment. Natural sources must be kept clean and
    protected.
  visual_prompt: >-
    water sources river lake rain well
  motion: kenburns
- n: 3
  narration: >-
    Water is used at home, school, farms, hospitals, and factories. Plants need water to grow.
    Animals need water to live. Farmers need water for crops. Every day, our life depends on
    water in many ways.
  visual_prompt: >-
    uses of water collage
  motion: kenburns
- n: 4
  narration: >-
    The water cycle shows how water moves. The Sun heats water and changes it into vapour.
    Vapour cools and forms clouds. Then rain brings water back to Earth. This process repeats
    again and again.
  visual_prompt: >-
    water cycle diagram
  motion: kenburns
- n: 5
  narration: >-
    Evaporation happens when liquid water changes into water vapour. Wet clothes dry because
    water evaporates. Puddles disappear after sunny weather because the Sun warms the water and
    changes it into vapour.
  visual_prompt: >-
    wet clothes drying and puddle evaporation
  motion: kenburns
- n: 6
  narration: >-
    Condensation happens when water vapour cools and becomes tiny water drops. These drops form
    clouds. When clouds become heavy, water falls as rain. Rain fills rivers, ponds, soil, and
    underground water.
  visual_prompt: >-
    cloud droplets rain falling
  motion: kenburns
- n: 7
  narration: >-
    Weather tells us how the air is outside today. It may be sunny, cloudy, rainy, windy, hot,
    or cold. Weather can change quickly. We choose clothes, umbrellas, and outdoor plans based
    on weather.
  visual_prompt: >-
    weather icons sunny cloudy rainy windy
  motion: kenburns
- n: 8
  narration: >-
    Seasons are longer weather patterns. Many places have summer, rainy season, winter, and
    spring-like changes. Seasons affect food, clothing, farming, festivals, and the activities
    people do.
  visual_prompt: >-
    season wheel summer rain winter spring
  motion: kenburns
- n: 9
  narration: >-
    Air is all around us. We need clean air to breathe. Smoke, dust, and harmful gases make air
    dirty. Planting trees, reducing smoke, and using cleaner transport help protect air quality.
  visual_prompt: >-
    clean air city tree smoke comparison
  motion: kenburns
- n: 10
  narration: >-
    Waste should not be thrown anywhere. Wet waste and dry waste can be separated. Paper,
    plastic, glass, and metal can often be reused or recycled. Reducing waste keeps surroundings
    clean.
  visual_prompt: >-
    waste sorting bins recycling
  motion: kenburns
- n: 11
  narration: >-
    The environment includes air, water, soil, plants, animals, and people. We protect it by
    saving water, planting trees, avoiding litter, reusing materials, and respecting animals.
    Small actions matter when many people join.
  visual_prompt: >-
    children protecting environment
  motion: kenburns
- n: 12
  narration: >-
    Let us revise. Name two water sources. What is evaporation? Why does rain happen? What is
    weather? How can we save water and protect air? These answers connect water, weather, and
    environment together.
  visual_prompt: >-
    environment quiz board
  motion: kenburns
