chapter: Class 4 Science - Matter and Materials
slides:
- n: 1
  narration: >-
    Matter is anything that takes up space and has weight. Your pencil, water bottle, school
    bag, air inside a balloon, and even steam are examples of matter. Studying matter helps us
    understand materials around us.
  visual_prompt: >-
    objects around child labeled matter
  motion: kenburns
- n: 2
  narration: >-
    We usually see matter as solid, liquid, or gas. A solid has a fixed shape. A liquid flows
    and takes the shape of a container. A gas spreads out and fills space. Ice, water, and steam
    show these states nicely.
  visual_prompt: >-
    solid liquid gas chart
  motion: kenburns
- n: 3
  narration: >-
    Solids have their own shape. A book, table, stone, pencil, and lunch box are solids. Some
    solids are hard, some are soft. Some can bend, while some break. We choose solids based on
    their properties.
  visual_prompt: >-
    solid objects hard soft flexible
  motion: kenburns
- n: 4
  narration: >-
    Liquids flow. They do not have their own fixed shape, so they take the shape of the
    container. Water, milk, oil, and juice are liquids. Some liquids are thick, while some flow
    quickly.
  visual_prompt: >-
    liquids in different containers
  motion: kenburns
- n: 5
  narration: >-
    Gases spread in all directions. Air is a gas mixture around us. We cannot see air, but we
    can feel it when the wind blows. A balloon becomes bigger because air fills space inside it.
  visual_prompt: >-
    balloon air wind gas
  motion: kenburns
- n: 6
  narration: >-
    Heating and cooling can change matter. Ice melts into water when heated. Water can freeze
    into ice when cooled. Water can change into vapour when heated strongly. These changes help
    us understand daily life.
  visual_prompt: >-
    ice water steam heating cooling arrows
  motion: kenburns
- n: 7
  narration: >-
    Some changes can be reversed. Ice melting into water and water freezing back into ice is
    reversible. Folding paper may also be reversed if it is not torn. A reversible change can go
    back to the earlier form.
  visual_prompt: >-
    reversible change examples
  motion: kenburns
- n: 8
  narration: >-
    Some changes cannot be easily reversed. Burning paper gives ash and smoke. Cooking dough
    into bread changes it permanently. Cutting vegetables also cannot make the whole vegetable
    exactly as before.
  visual_prompt: >-
    irreversible change examples
  motion: kenburns
- n: 9
  narration: >-
    Objects are made from materials such as wood, metal, plastic, glass, rubber, cotton, and
    clay. We choose materials because of their properties, like strength, flexibility,
    transparency, softness, or waterproof nature.
  visual_prompt: >-
    materials wood metal plastic glass rubber
  motion: kenburns
- n: 10
  narration: >-
    Some things dissolve in water. Sugar and salt dissolve. Sand and oil do not dissolve
    properly. This helps us separate materials and understand mixtures. Try mixing sugar, sand,
    and oil separately in water.
  visual_prompt: >-
    salt sugar sand oil in water jars
  motion: kenburns
- n: 11
  narration: >-
    Some objects float on water, and some sink. A leaf may float, while a stone sinks. Floating
    depends on many things, including material, shape, and weight. This is a fun observation
    activity at home.
  visual_prompt: >-
    objects floating and sinking in water
  motion: kenburns
- n: 12
  narration: >-
    Let us revise. What is matter? Name one solid, one liquid, and one gas. What happens when
    ice melts? Give one reversible and one irreversible change. Why do we choose different
    materials for different objects?
  visual_prompt: >-
    matter quiz board
  motion: kenburns
