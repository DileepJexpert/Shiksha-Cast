chapter: Class 4 Science - Plants and Food
slides:
- n: 1
  narration: >-
    Plants are living things. They grow, breathe, need water, need sunlight, and make new
    plants. Some plants are tiny herbs, some are shrubs, and some become tall trees. When we
    study plants, we learn how life begins from seeds and how green leaves help the plant
    survive.
  visual_prompt: >-
    child observing different plants in garden
  motion: kenburns
- n: 2
  narration: >-
    A plant has many parts, and each part has a job. Roots hold the plant in the soil and take
    in water. The stem carries water and supports the plant. Leaves make food. Flowers and
    fruits help many plants produce seeds.
  visual_prompt: >-
    labeled plant parts diagram
  motion: kenburns
- n: 3
  narration: >-
    Roots usually grow below the soil. They hold the plant firmly, like an anchor. Roots also
    absorb water and minerals from the soil. Some roots, like carrot and radish, store food.
    That is why we can eat them as vegetables.
  visual_prompt: >-
    roots under soil absorbing water
  motion: kenburns
- n: 4
  narration: >-
    The stem works like a pipe inside the plant. It carries water from roots to leaves and food
    from leaves to other parts. Some stems are soft and green. Some stems are hard and woody,
    like the trunk of a tree.
  visual_prompt: >-
    stem carrying water arrows
  motion: kenburns
- n: 5
  narration: >-
    Leaves are called food factories of plants. They use sunlight, water, and air to make food.
    This process is called photosynthesis. For Class 4, remember the simple idea: green leaves
    use sunlight to prepare food for the plant.
  visual_prompt: >-
    leaf food factory sunlight water air
  motion: kenburns
- n: 6
  narration: >-
    A seed can grow into a new plant when it gets air, water, and warmth. The baby plant coming
    out of a seed is called germination. Try keeping soaked seeds on wet cotton and watch them
    grow slowly.
  visual_prompt: >-
    seed germination stages
  motion: kenburns
- n: 7
  narration: >-
    Many plants have flowers. Flowers may become fruits. Fruits protect seeds inside them. When
    seeds reach soil, they may grow into new plants. This is how many plants continue their life
    cycle again and again.
  visual_prompt: >-
    flower to fruit to seed cycle
  motion: kenburns
- n: 8
  narration: >-
    Plants give us cereals, pulses, fruits, vegetables, spices, oil, tea, coffee, and sugar.
    Rice and wheat are cereals. Gram and lentils are pulses. Fruits and vegetables help us stay
    healthy because they contain vitamins and minerals.
  visual_prompt: >-
    food from plants colorful plate
  motion: kenburns
- n: 9
  narration: >-
    Plants do not give only food. They give wood, cotton, paper, medicines, rubber, shade, and
    clean air. Trees also give homes to birds and insects. Protecting plants means protecting
    life around us.
  visual_prompt: >-
    tree giving shade oxygen fruits and wood
  motion: kenburns
- n: 10
  narration: >-
    Grow one small plant in a pot. Give it enough water and sunlight. Do not overwater it.
    Observe its height every few days. Draw what you see in a notebook. This simple activity
    makes you a young scientist.
  visual_prompt: >-
    child measuring potted plant
  motion: kenburns
- n: 11
  narration: >-
    Do not think all plants are the same. Some plants live in water, some in deserts, and some
    in cold places. Do not think only flowers are important. Roots, stems, leaves, fruits, and
    seeds all have useful jobs.
  visual_prompt: >-
    different plant habitats comparison
  motion: kenburns
- n: 12
  narration: >-
    Let us revise. What do roots do? Which part makes food? What does a seed need to grow? Name
    two foods we get from plants. Why should we protect trees? If you can answer these, you
    understand plants well.
  visual_prompt: >-
    quiz board with plant questions
  motion: kenburns
