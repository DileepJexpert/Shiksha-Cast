chapter: Science Class 4 - Subject-wise Foundation
slides:
- n: 1
  narration: Welcome to Science Class 4. In this subject-wise foundation tutorial, we will learn plants,
    animals, the human body, matter, force, Earth and environment. Science begins with looking carefully,
    asking questions, and testing ideas with simple examples around us.
  visual_prompt: bright educational cover with child scientist, plant, animal, planet, magnet and water
    cycle icons
  motion: kenburns
- n: 2
  narration: 'Today we will build a simple learning map. We will not memorize random facts. We will connect
    six big science areas: plants, animals, human body, matter, force, and Earth. Each area helps us understand
    everyday life better.'
  visual_prompt: mind map showing six class 4 science topics as colorful connected bubbles
  motion: kenburns
- n: 3
  narration: A scientist does not only read answers. A scientist observes, asks, tests, records and explains.
    Even a Class 4 student can do science at home, like checking which object floats, which surface is
    rough, or which plant grows better.
  visual_prompt: cartoon notebook with observe question test record explain steps
  motion: kenburns
- n: 4
  narration: Plants are living things. They grow from seeds, need water and sunlight, and respond to their
    surroundings. Roots hold the plant, the stem carries water, and leaves make food. Flowers and fruits
    help many plants make new plants.
  visual_prompt: labeled diagram of plant roots stem leaves flower fruit and sunlight
  motion: kenburns
- n: 5
  narration: 'Leaves are like tiny food factories. They use sunlight, water and air to make food for the
    plant. This process is called photosynthesis. We do not need to remember a difficult formula now.
    Just remember: sunlight plus water plus air helps leaves make food.'
  visual_prompt: leaf as a food factory with sunlight water air arrows and oxygen bubbles
  motion: kenburns
- n: 6
  narration: Here is a simple activity. Keep one soaked seed on wet cotton and another on dry cotton.
    Watch them for three days. The seed with moisture usually sprouts better. This helps us learn that
    seeds need water to start growing.
  visual_prompt: two seed jars one with wet cotton and sprout one dry with no sprout
  motion: kenburns
- n: 7
  narration: Animals live in different habitats. Fish live in water, camels live in deserts, birds live
    in trees or nests, and earthworms live in moist soil. A good habitat gives food, water, shelter and
    space.
  visual_prompt: split scene with pond fish desert camel tree bird and soil earthworm
  motion: kenburns
- n: 8
  narration: An adaptation is a feature or behaviour that helps an animal survive. A duck has webbed feet
    for swimming. A polar animal may have thick fur for warmth. Some animals hide, run fast, or move in
    groups for safety.
  visual_prompt: animal adaptation chart with webbed feet claws fur beak and camouflage
  motion: kenburns
- n: 9
  narration: A food chain shows how food energy moves. Plants make food. A grasshopper may eat grass.
    A frog may eat the grasshopper. A snake may eat the frog. If one part of a food chain changes, other
    living things can also be affected.
  visual_prompt: simple grass to grasshopper to frog to snake food chain arrows
  motion: kenburns
- n: 10
  narration: Our body is a team of organs. The brain helps us think, the heart pumps blood, lungs help
    us breathe, the stomach helps digest food, and bones give shape and protection. Good food, sleep and
    exercise keep this team strong.
  visual_prompt: friendly human body diagram with brain heart lungs stomach bones labels
  motion: kenburns
- n: 11
  narration: Our sense organs help us understand the world. Eyes see, ears hear, nose smells, tongue tastes,
    and skin feels. Teeth help us bite and chew food. Brushing twice a day and rinsing after meals protect
    our teeth.
  visual_prompt: five sense organs and different types of teeth shown as friendly icons
  motion: kenburns
- n: 12
  narration: Matter is anything that takes space. We often see matter as solid, liquid or gas. A pencil
    is solid. Water is liquid. Air is gas. Water is special because we can easily see it as ice, liquid
    water, and water vapour.
  visual_prompt: ice cube glass of water and steam cloud labeled solid liquid gas
  motion: kenburns
- n: 13
  narration: Many changes happen around us. Ice melts into water, and water can freeze back into ice.
    That is a reversible change. But burning paper makes ash and smoke, so we cannot easily get the same
    paper back.
  visual_prompt: reversible ice water cycle and irreversible burnt paper comparison
  motion: kenburns
- n: 14
  narration: A force is a push or a pull. We push a door, pull a drawer, kick a ball, or press clay into
    a new shape. Force can start motion, stop motion, change speed, change direction, or change shape.
  visual_prompt: children pushing cart pulling drawer kicking ball and squeezing clay
  motion: kenburns
- n: 15
  narration: Friction is a force between touching surfaces. It can slow things down, but it also helps
    us. Without friction, walking would be very hard and bicycle brakes would not work well. Rough surfaces
    often make more friction than smooth surfaces.
  visual_prompt: shoe grip on rough ground bicycle brake and smooth vs rough ramp
  motion: kenburns
- n: 16
  narration: The water cycle explains how water keeps moving. The Sun heats water and changes some of
    it into vapour. Vapour cools and forms clouds. Then rain brings water back to Earth. This cycle supports
    plants, animals and people.
  visual_prompt: water cycle diagram with sun evaporation clouds rain river arrows
  motion: kenburns
- n: 17
  narration: 'The environment is everything around us: air, water, soil, plants, animals and people. We
    can help by saving water, reducing waste, caring for plants, and reusing materials. Small habits become
    big protection when many people follow them.'
  visual_prompt: children saving water planting tree sorting waste and recycling arrows
  motion: kenburns
- n: 18
  narration: Let us revise. Which plant part takes water from soil? Name one animal adaptation. What are
    the three common states of matter? Give one example of push and one of pull. Why is friction useful
    when we walk? If you can explain these, your foundation is strong.
  visual_prompt: quiz board with five question cards plants animals body matter force earth
  motion: kenburns
