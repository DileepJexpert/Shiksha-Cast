chapter: "Kinnu Learns Addition — Funny Maths Story for Kids"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki rangin duniya mein aapka swagat hai! आज Kinnu सीखेगी addition — यानी चीज़ों को jodna. लेकिन रुको — Kinnu कहती है, 2 plus 3 बराबर तेईस! अरे, क्या ये सही है? चलो दोस्तों, मिलकर पता करते हैं! Ready? Let's go!"
  - n: 2
    voice: kavya
    narration: "देखो दोस्तों! Kinnu ke paas hain do laddoo. एक… दो! दो yummy-yummy laddoo! Kinnu बहुत खुश है. Two laddoos! चलो मेरे साथ गिनो — एक, दो!"
  - n: 3
    voice: kavya
    narration: "तभी Kinnu ka dost aata hai. और देता है तीन aur laddoo! एक… दो… तीन! Three more laddoos! वाह! Kinnu और भी खुश हो गई. Thank you, dost!"
  - n: 4
    voice: kavya
    narration: "अब Kinnu सोचती है — मेरे पास कितने laddoo हैं? Kinnu ज़ोर से बोलती है — अब मेरे पास तेईस laddoo! तेईस?! अरे नहीं Kinnu! ये तो galat hai! तुमने do और teen को jod नहीं, बस साथ रख दिया. Oops!"
  - n: 5
    voice: kavya
    narration: "तभी teacher कहती हैं — Kinnu, addition का मतलब है putting together! यानी चीज़ों को साथ मिलाकर jodna. दो laddoo plus तीन laddoo. चलो इन्हें साथ में गिनते हैं — 2 plus 3!"
  - n: 6
    voice: kavya
    narration: "चलो साथ में गिनते हैं! एक… दो… तीन… चार… पाँच! 1, 2, 3, 4, 5! देखा दोस्तों? सब मिलकर पाँच laddoo! Five laddoos! तो 2 plus 3 बराबर 5. शाबाश!"
  - n: 7
    voice: kavya
    narration: "अब आता है practice time! चलो अब तुम करो. यहाँ हैं चार pencils, और दो aur pencils. सबको गिनो — चार plus दो! सोचो… जवाब है — छह! 4 plus 2 बराबर 6! तुम तो बहुत smart हो!"
  - n: 8
    voice: kavya
    narration: "तो आज हमने क्या सीखा? Addition का मतलब है — putting things together! दो plus तीन बराबर पाँच. Joining numbers नहीं, बल्कि jodna और गिनना! अगर मज़ा आया तो Kinnu को like और subscribe ज़रूर करना. Learn with Kinnu! बाय-बाय, फिर मिलेंगे!"
