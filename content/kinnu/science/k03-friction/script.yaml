chapter: K03 Friction - Why Things Slow Down
slides:
  - n: 1
    narration: >-
      Hello friends! Kinnu is in the science lab today. She gives a toy car a
      push, but after some time it slows down and stops. Why does that happen?
      The secret word is friction.
  - n: 2
    narration: >-
      Friction is a force that happens when two surfaces rub or touch each
      other. When the toy car wheels touch the floor, friction pushes against
      the motion.
  - n: 3
    narration: >-
      On a smooth floor, there is less friction. The toy car can move farther
      and faster. Smooth surfaces feel slippery because they do not stop motion
      quickly.
  - n: 4
    narration: >-
      On a rough surface, there is more friction. The toy car slows down fast.
      Rough surfaces have tiny bumps, and those bumps hold things back.
  - n: 5
    narration: >-
      Friction is not bad. Friction helps our shoes grip the ground. Without
      friction, Kinnu would slip and slide everywhere.
  - n: 6
    narration: >-
      Friction can also make heat. Rub your hands together quickly. They become
      warm because friction turns some movement into heat.
  - n: 7
    narration: >-
      Now you try. Which has more friction: ice or sandpaper? Ice is smooth, so
      it has less friction. Sandpaper is rough, so it has more friction.
  - n: 8
    narration: >-
      Today we learned that friction slows things down, helps us grip, and can
      make heat. Great job, science explorer! Like and subscribe for more Kinnu
      science.
