chapter: "Kinnu's Good Habit Mission | Moral Story for Kids"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki rangin duniya mein aapka swagat hai! आज Kinnu khel ke baad apne toys ko zameen par hi chhodne wali hai. Blocks idhar, teddy udhar, crayons sab taraf! Kinnu sochti hai — baad mein utha lungi. लेकिन रुको दोस्तों — kya ye sahi habit hai? चलो मिलकर पता करते हैं! Ready? Let's go!"
  - n: 2
    voice: kavya
    narration: "देखो दोस्तों! Kinnu ka room ab ek bada sa mess ban gaya. Toys, books, socks — sab floor par bikhre pade hain! Kinnu khush hoke kehti hai — main toh thak gayi, ab so jaati hun. लेकिन room dekho — bilkul jungle jaisa! Oh no, Kinnu!"
  - n: 3
    voice: kavya
    narration: "Subah Kinnu ko apni favourite teddy chahiye. वो dhoondhti hai — par teddy kahin nahi mil rahi! Kinnu blocks par paer rakhti hai — oops, gir gayi! फिर apni crayons bhi nahi milti. Kinnu udaas ho jaati hai. Bikhre room mein kuch bhi nahi milta. Kitni mushkil ho gayi!"
  - n: 4
    voice: kavya
    narration: "तभी Mummy pyaar se kehti hain — Kinnu beta, agar hum cheezon ko apni jagah par rakhein, toh sab kuch asaani se mil jaata hai. Ye hai ek bahut achhi aadat — cleanliness! Saaf-suthra room rakhna. Kinnu soch mein pad jaati hai. Hmm, ye toh sahi baat hai!"
  - n: 5
    voice: kavya
    narration: "Kinnu kehti hai — main abhi apna room saaf karungi! वो ek-ek karke toys uthati hai. Blocks ko box mein, books ko shelf par, socks ko basket mein. एक… दो… तीन! Sab cheezein apni jagah par. Kinnu mehnat kar rahi hai aur muskura bhi rahi hai. Shabaash Kinnu!"
  - n: 6
    voice: kavya
    narration: "थोड़ी der mein — wow! Kinnu ka room chamak raha hai! Sab kuch saaf aur tidy. Ab Kinnu ko apni teddy turant mil gayi! Aur crayons bhi! Kinnu khush ho gayi. वो samajh gayi — saaf room mein khelna kitna asaan aur mazedaar hai!"
  - n: 7
    voice: kavya
    narration: "तो दोस्तों, aaj Kinnu ne ek badhiya aadat seekhi — apni cheezein hamesha apni jagah par rakhna, room ko saaf rakhna. Cleanliness is a super good habit! अब tum bhi karo — khelne ke baad apne toys khud uthao aur unki jagah par rakho. Karoge na? Pakka!"
  - n: 8
    voice: kavya
    narration: "तो आज हमने क्या सीखा? Achhi aadat — cleanliness! Apni cheezein apni jagah par rakhna, room saaf rakhna. इससे sab kuch asaani se milta hai aur ghar sundar lagta hai. Kinnu ki tarah tum bhi ye good habit apnao! Learn with Kinnu again! Like aur subscribe karo. A Katixo channel. बाय-बाय!"
