chapter: "Kinnu's Time Machine | Yesterday, Today, Tomorrow"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki rangin duniya mein aapka swagat hai! आज Kinnu ने एक मज़ेदार Time Machine बनाई है. लेकिन अरे — Kinnu घबरा गई! वो कहती है, आज सोमवार है, कल भी सोमवार था, और कल भी सोमवार होगा! सब दिन एक जैसे?! क्या ये सही है? चलो दोस्तों, Time Machine में बैठो — Let's go!"
  - n: 2
    voice: kavya
    narration: "Time Machine चली! सबसे पहले Kinnu पहुँची कल — yesterday! Yesterday यानी जो दिन बीत गया, जो पहले आया था. Kinnu याद करती है — कल मैंने park में खेला, ice-cream खाई, और जल्दी सो गई. वाह! Yesterday मतलब बीता हुआ दिन. Kinnu समझ गई!"
  - n: 3
    voice: kavya
    narration: "अब Time Machine वापस आई आज में — today! Today यानी अभी, this very day. Kinnu खुश हो गई और बोली — आज मैं school जा रही हूँ, friends से मिल रही हूँ, और नई चीज़ें सीख रही हूँ. Today मतलब जो दिन अभी चल रहा है. यही तो है आज का मज़ा!"
  - n: 4
    voice: kavya
    narration: "फिर Time Machine उड़ी आगे — कल, tomorrow! Tomorrow यानी जो दिन अभी आने वाला है, जो अभी नहीं आया. Kinnu सोचती है — कल मैं cake बनाऊँगी, दादी के घर जाऊँगी, और खूब मज़े करूँगी. Tomorrow मतलब आने वाला दिन. कितना exciting!"
  - n: 5
    voice: kavya
    narration: "अब Kinnu की उलझन दूर हो गई! देखो दोस्तों — Yesterday, जो बीत गया. Today, जो अभी है. Tomorrow, जो आने वाला है. तीनों अलग-अलग दिन हैं, एक जैसे नहीं! Kinnu हँसते हुए बोली — मैंने गलत समझा था. अब Kinnu सब साफ़-साफ़ समझ गई!"
  - n: 6
    voice: kavya
    narration: "चलो एक मज़ेदार example लेते हैं! Kinnu कहती है — कल मैंने drawing बनाई थी, that was yesterday. आज मैं उसे colour कर रही हूँ, that is today. और कल मैं उसे teacher को दिखाऊँगी, that is tomorrow! देखा? एक ही काम, तीन अलग दिन. Time ऐसे ही चलता है — आगे, आगे, आगे!"
  - n: 7
    voice: kavya
    narration: "अब आता है quiz time! चलो अब तुम करो. आज अगर बुधवार है — Wednesday — तो yesterday कौन सा दिन था? सोचो ज़रा… हाँ! मंगलवार — Tuesday! और tomorrow कौन सा दिन होगा? सोचो… बिल्कुल सही — गुरुवार, Thursday! वाह दोस्तों, तुम तो बहुत smart हो!"
  - n: 8
    voice: kavya
    narration: "तो आज हमने क्या सीखा? Yesterday मतलब बीता हुआ दिन, Today मतलब अभी का दिन, और Tomorrow मतलब आने वाला दिन. Time हमेशा आगे चलता है! Kinnu की Time Machine में बहुत मज़ा आया. Learn with Kinnu again! अगर मज़ा आया तो like और subscribe ज़रूर करना. A Katixo channel. बाय-बाय, फिर मिलेंगे!"
