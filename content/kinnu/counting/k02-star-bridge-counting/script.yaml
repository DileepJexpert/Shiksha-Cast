chapter: "Kinnu & the Star Bridge | Count 1 to 10 — Fun Kids Learning"
brand: "KINNU"
slides:
  - n: 1
    narration: "Hello friends, and welcome back to Kinnu! Tonight, Kinnu spots a magical Star Bridge glowing across the sky. But oh no — Kinnu got her counting all mixed up! Let's help her cross the bridge by counting from one to ten. Are you ready? Let's go!"
  - n: 2
    narration: "Here is the very first star. Number one! Kinnu hops on and shouts, one! Say it with me, nice and loud — one!"
  - n: 3
    narration: "Now Kinnu keeps going. Let's count together — one, two, three! Wonderful! Kinnu is counting just right!"
  - n: 4
    narration: "Kinnu reaches the middle of the bridge. Keep counting — four, five! We are halfway there! Great job, Kinnu!"
  - n: 5
    narration: "Now Kinnu jumps bravely across the next stars. Count with me — six, seven, eight! You are doing amazing! Keep going!"
  - n: 6
    narration: "Just a little more! Count — nine, ten! Yay! Kinnu made it! She crossed the whole Star Bridge!"
  - n: 7
    narration: "Now it is your turn, friends! Count all the stars with Kinnu, from one to ten. Ready? One, two, three..."
  - n: 8
    narration: "Amazing work today! We counted all the way from one to ten. Come back soon for more fun with Kinnu. Don't forget to like and subscribe! Learn with Kinnu — a Katixo channel!"
