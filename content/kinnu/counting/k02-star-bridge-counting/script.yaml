chapter: Kinnu & the Star Bridge — Ginti 1 se 10!
slides:
  - n: 1
    narration: >-
      Kinnu raat ke aasman mein ek chamakdar Star Bridge dekhti hai. Lekin oh no!
      Kinnu counting mein confused ho gayi. Chalo Kinnu ki help karte hain aur
      1 se 10 tak ginti seekhte hain.
  - n: 2
    narration: >-
      Yeh hai number 1. Ek! Kinnu pehle chamakte hue star par khadi hai.
      Sab bolo — 1, Ek!
  - n: 3
    narration: >-
      Ab Kinnu aage badh rahi hai. Count karo — 1, 2, 3!
      Wah, Kinnu sahi ginti kar rahi hai.
  - n: 4
    narration: >-
      Kinnu bridge ke beech mein pahunch gayi. Count karo — 4, 5!
      Aadha ho gaya!
  - n: 5
    narration: >-
      Ab Kinnu himmat se aage badh rahi hai. Count karo — 6, 7, 8!
      Great job, Kinnu!
  - n: 6
    narration: >-
      Bas thoda sa aur! Count karo — 9, 10! Yay! Kinnu jeet gayi!
  - n: 7
    narration: >-
      Ab tumhari baari! Kinnu ke saath 1 se 10 tak stars count karo.
  - n: 8
    narration: >-
      Amazing! Aaj humne 1 se 10 tak counting seekhi. Kinnu ke saath phir
      milenge. Like aur Subscribe karna mat bhoolna. A Katixo channel.
