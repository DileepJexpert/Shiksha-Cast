chapter: "Kinnu & the Star Bridge — Ginti 1 se 10!"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "Kinnu रात के आसमान में एक चमकदार Star Bridge देखती है। लेकिन oh no! Kinnu counting में confuse हो गई। चलो दोस्तों, Kinnu की help करते हैं और एक से दस तक ginti सीखते हैं!"
  - n: 2
    voice: kavya
    narration: "ये है number One! Kinnu पहले चमकते हुए star पर खड़ी है। सब मेरे साथ बोलो — एक, One!"
  - n: 3
    voice: kavya
    narration: "अब Kinnu आगे बढ़ रही है। चलो count करो — एक, दो, तीन! वाह! Kinnu बिलकुल सही ginti कर रही है।"
  - n: 4
    voice: kavya
    narration: "Kinnu bridge के बीच में पहुँच गई। चलो गिनो — चार, पाँच! आधा रास्ता हो गया! Halfway, शाबाश Kinnu!"
  - n: 5
    voice: kavya
    narration: "अब Kinnu हिम्मत से आगे बढ़ रही है। चलो count करो — छह, सात, आठ! Great job, Kinnu! तुम भी मेरे साथ गिनो।"
  - n: 6
    voice: kavya
    narration: "बस थोड़ा सा और! चलो गिनो — नौ, दस! Yay! Kinnu जीत गई! पूरा Star Bridge पार हो गया!"
  - n: 7
    voice: kavya
    narration: "अब तुम्हारी बारी, दोस्तों! Kinnu के साथ एक से दस तक सारे stars count करो। Ready? एक, दो, तीन..."
  - n: 8
    voice: kavya
    narration: "Amazing! आज हमने एक से दस तक counting सीखी। Kinnu के साथ फिर मिलेंगे। Like और Subscribe करना मत भूलना। Learn with Kinnu! A Katixo channel."
