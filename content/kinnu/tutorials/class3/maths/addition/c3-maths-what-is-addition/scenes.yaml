  - who: kinnu_hd
    do: talk
    text: Let us quickly remember what we learned today.
  - who: kinnu_hd
    do: talk
    text: Addition means putting things together.
  - who: kinnu_hd
    do: talk
    text: The plus sign means plus, and it tells us to add.
  - who: kinnu_hd
    do: talk
    text: We count to find how many there are in all.
  - who: kinnu_hd
    do: talk
    text: And adding one just gives us the next counting number.
  board:
