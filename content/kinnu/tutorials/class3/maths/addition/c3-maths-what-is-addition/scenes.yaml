  - who: kinnu_hd
    do: talk
    text: Let us try an example with apples. Here are two red apples in the first group.
  - who: kinnu_hd
    do: talk
    text: And here are three more apples in the second group.
  - who: kinnu_hd
    do: talk
    text: Now we put them together. Let us count them all, one by one.
  - who: kinnu_hd
    do: talk
    text: One, two, three, four, five. There are five apples in all!
  - who: kinnu_hd
    do: talk
    text: So two plus three equals five. Well done!
