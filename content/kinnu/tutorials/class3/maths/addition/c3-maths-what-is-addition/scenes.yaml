- id: s5_solve
  background: classroom_full.png
  transition:
    in: 0.3
    out: 0.25
  characters:
  - id: kinnu_hd
    pos:
    - 0.17
    - 0.99
    scale: 0.9
    facing: right
  actions:
  - who: kinnu_hd
    do: point
    side: right
    start: 0.2
    end: 12.0
  - who: kinnu_hd
    do: talk
    text: Let us solve four plus one, step by step.
  - who: kinnu_hd
    do: talk
    text: First, we start with the bigger number, four.
  - who: kinnu_hd
    do: talk
    text: Now we count just one more. After four comes five.
  - who: kinnu_hd
    do: talk
    text: So four plus one equals five. You did it!
  - who: kinnu_hd
    do: talk
    text: When we add one, we just say the next counting number. That is a handy trick!
  board:
    title: 4 + 1 = ?
    lines:
    - text: Start with 4
      at: 0.5
    - text: Count just 1 more
      at: 1.9
    - text: 4 ... then 5
      at: 3.3
    - text: 4 + 1 = 5
      at: 4.7
