  - who: kinnu_hd
    do: talk
    text: Hello friends! I am Kinnu, and this is my little brother Vibhu.
  - who: kinnu_hd
    do: talk
    text: Have you ever put all your toys into one big box and counted them?
  - who: kinnu_hd
    do: talk
    text: Or counted all the chocolates from two of your friends together?
  - who: kinnu_hd
    do: talk
    text: When we put things together and count them all, that is called addition!
  - who: kinnu_hd
    do: talk
    text: 'Today we will learn: what is addition? Let us begin!'
  overlays:
  - type: banner
    text: Let's Learn Addition!
    start: 0.0
    end: 4.0
- id: s2_concept
  background: classroom_full.png
  transition:
    in: 0.3
    out: 0.25
  characters:
  - id: kinnu_hd
    pos:
    - 0.17
    - 0.99
    scale: 0.9
    facing: right
  actions:
  - who: kinnu_hd
    do: point
    side: right
    start: 0.2
    end: 9.0
  - who: kinnu_hd
    do: talk
    text: Look at our blackboard. Addition means putting things together.
  - who: kinnu_hd
    do: talk
    text: When we add, we want to find how many there are in all, altogether.
  - who: kinnu_hd
    do: talk
    text: We use a special sign for addition. It looks like a small cross. This is the plus sign.
  - who: kinnu_hd
    do: talk
    text: We read the plus sign as the word plus.
  - who: kinnu_hd
    do: talk
    text: So when we see two plus three, it means we put two and three together.
  board:
    title: What is Addition?
    lines:
    - text: Addition means PUTTING TOGETHER
      at: 0.5
    - text: We find HOW MANY in all
      at: 1.9
    - text: The sign for addition is  +
      at: 3.3
    - text: We read  +  as  PLUS
      at: 4.7
    - text: 2 + 3  means  2 plus 3
      at: 6.1
    pos:
    - 0.66
    - 0.4
    size:
    - 0.58
    - 0.62
- id: s3_example
