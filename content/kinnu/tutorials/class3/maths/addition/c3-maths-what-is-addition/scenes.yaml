  - who: kinnu_hd
    do: talk
    text: Now it is your turn to think, just like Vibhu.
  - who: kinnu_hd
    do: talk
    text: Can you tell me, what is four plus one?
  - who: kinnu_hd
    do: talk
    text: Take a moment. Count it in your head, or use your fingers.
  - who: kinnu_hd
    do: talk
    text: Ready? Let us solve it together on the board.
