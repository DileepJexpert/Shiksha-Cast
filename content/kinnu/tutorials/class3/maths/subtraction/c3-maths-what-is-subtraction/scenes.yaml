  - who: kinnu_hd
    do: talk
    text: Hello friends! I am Kinnu, and this is my little brother Vibhu. Welcome back to our classroom!
  - who: kinnu_hd
    do: talk
    text: Yesterday we learned how to put things together. That was addition.
  - who: kinnu_hd
    do: talk
    text: But what happens when we take some things away?
  - who: kinnu_hd
    do: talk
    text: Imagine you have five toffees, and you give two toffees to your friend. How many are left with
      you?
  - who: kinnu_hd
    do: talk
    text: When we take things away and find how many are left, that is called subtraction!
  - who: kinnu_hd
    do: talk
    text: It is a magic word that we use almost every day.
  - who: kinnu_hd
    do: talk
    text: 'Today we will learn: what is subtraction? So sit up straight, keep your eyes on the board,
      and let us begin!'
  overlays:
  - type: banner
    text: Let's Learn Subtraction!
    start: 0.0
    end: 4.0
- id: s2_concept
  background: classroom_full.png
  transition:
    in: 0.3
    out: 0.25
  characters:
  - id: kinnu_hd
    pos:
    - 0.17
    - 0.99
    scale: 0.9
    facing: right
  actions:
  - who: kinnu_hd
    do: point
    side: right
    start: 0.2
    end: 9.0
  - who: kinnu_hd
    do: talk
    text: Look carefully at our blackboard, friends.
  - who: kinnu_hd
    do: talk
    text: Subtraction means taking some things away from a group.
  - who: kinnu_hd
    do: talk
    text: When we subtract, we want to find how many are left behind.
  - who: kinnu_hd
    do: talk
    text: We do subtraction every single day, without even knowing it.
  - who: kinnu_hd
    do: talk
    text: When you eat one biscuit from a packet, the packet has fewer biscuits left. That is subtraction!
  - who: kinnu_hd
    do: talk
    text: When a bird flies away from a tree, there are fewer birds on the tree. That is subtraction too!
  - who: kinnu_hd
    do: talk
    text: We use a special sign for subtraction. It is a small line, like this.
  - who: kinnu_hd
    do: talk
    text: This is called the minus sign.
  - who: kinnu_hd
    do: talk
    text: We read the minus sign as the word minus.
  - who: kinnu_hd
    do: talk
    text: So when we see five minus two, it means we start with five and take two away.
  - who: kinnu_hd
    do: talk
    text: Addition makes a group bigger. But subtraction makes a group smaller.
  - who: kinnu_hd
    do: talk
    text: Remember that, and you will never get confused between them!
  board:
    title: What is Subtraction?
    lines:
    - text: Subtraction means TAKING AWAY
      at: 0.5
    - text: We find HOW MANY are LEFT
      at: 1.9
    - text: The sign for subtraction is  -
      at: 3.3
    - text: We read  -  as  MINUS
      at: 4.7
    - text: 5 - 2  means  5 minus 2
      at: 6.1
