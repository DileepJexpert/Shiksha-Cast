  actions:
  - who: kinnu_hd
    do: point
    side: right
    start: 0.2
    end: 10.0
  - who: kinnu_hd
    do: talk
    text: Let us try an example with apples, just like before.
  - who: kinnu_hd
    do: talk
    text: Here we have five red apples on the table. Let us count them slowly. One, two, three, four,
      five.
  - who: kinnu_hd
    do: talk
    text: Five apples in all. Now watch carefully what happens.
  - who: kinnu_hd
    do: talk
    text: Vibhu feels hungry, so he takes away two apples to eat.
  - who: kinnu_hd
    do: talk
    text: We take the first apple away. And we take the second apple away.
  - who: kinnu_hd
    do: talk
    text: Now let us count how many apples are still left on the table.
  - who: kinnu_hd
    do: talk
    text: One, two, three. There are three apples left!
  - who: kinnu_hd
    do: talk
    text: So five minus two equals three. Shabaash, Vibhu!
  - who: kinnu_hd
    do: talk
    text: Did you see? We started with five, and we ended with a smaller number, three.
  - who: kinnu_hd
    do: talk
    text: That is exactly what subtraction does. It makes the number smaller.
  - who: kinnu_hd
    do: talk
    text: Let us say it together one more time. Five apples, take away two apples, leaves three apples.
  - who: kinnu_hd
    do: talk
    text: Whenever you take something away, just count what is left. That is the secret of subtraction!
  board:
    title: 5 - 2 = ?
    lines:
    - text: 'We start with:  5 apples'
      at: 0.5
    - text: 'We take away:  2 apples'
      at: 1.9
    - text: Count how many are LEFT
      at: 3.3
    - text: 5 ... take 2 ... 3 left
      at: 4.7
    - text: 5 - 2 = 3 apples
      at: 6.1
