  - who: kinnu_hd
    do: talk
    text: Now here is some practice for you to try at home.
  - who: kinnu_hd
    do: talk
    text: Pause the video and solve these four sums in your notebook.
  - who: kinnu_hd
    do: talk
    text: Number one, four minus one. Number two, five minus three.
  - who: kinnu_hd
    do: talk
    text: Number three, seven minus two. And number four, six minus six.
  - who: kinnu_hd
    do: talk
    text: For the last one, think carefully. If you take away everything, how many are left? That is right,
      zero!
  - who: kinnu_hd
    do: talk
    text: Remember, you can count backwards on your fingers, or draw little circles and cross them out.
  - who: kinnu_hd
    do: talk
    text: Practice a little every day, and subtraction will become very, very easy for you.
  - who: kinnu_hd
    do: talk
    text: Show your answers to your parents, and ask them to give you two more sums to solve.
  - who: kinnu_hd
    do: talk
    text: You all did wonderfully today. Learning is fun when we do it together!
  - who: kinnu_hd
    do: talk
    text: Come back tomorrow, because Kinnu has a brand new lesson waiting just for you.
