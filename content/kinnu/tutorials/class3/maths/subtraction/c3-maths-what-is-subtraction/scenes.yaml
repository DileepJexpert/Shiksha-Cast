  - who: kinnu_hd
    do: talk
    text: Let us quickly remember everything we learned today.
  - who: kinnu_hd
    do: talk
    text: Subtraction means taking things away from a group.
  - who: kinnu_hd
    do: talk
    text: The minus sign tells us to subtract, and we read it as minus.
  - who: kinnu_hd
    do: talk
    text: We count to find how many are left behind.
  - who: kinnu_hd
    do: talk
    text: And the smart trick is to count backwards when we subtract.
  - who: kinnu_hd
    do: talk
    text: After subtraction, our answer always becomes smaller than what we started with.
  - who: kinnu_hd
    do: talk
    text: Addition adds more, and subtraction takes away. They are like two best friends in maths.
  - who: kinnu_hd
    do: talk
    text: You learned so much today, friends. I am very proud of you!
  board:
    title: Remember!
    lines:
    - text: Subtraction = taking away
      at: 0.5
    - text: '-  means  MINUS'
      at: 1.9
    - text: We count HOW MANY are LEFT
      at: 3.3
    - text: Subtraction = count BACKWARDS
      at: 4.7
    - text: The answer gets SMALLER
      at: 6.1
    pos:
    - 0.66
    - 0.4
    size:
    - 0.58
    - 0.62
