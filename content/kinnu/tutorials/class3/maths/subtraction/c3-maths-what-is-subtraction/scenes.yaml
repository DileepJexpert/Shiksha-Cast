  - who: kinnu_hd
    do: talk
    text: Now it is your turn to think, just like Vibhu is thinking.
  - who: kinnu_hd
    do: talk
    text: Here is a question for you. Listen carefully.
  - who: kinnu_hd
    do: talk
    text: You have six colourful balloons in your hand, holding them tight.
  - who: kinnu_hd
    do: talk
    text: Suddenly, two balloons slip away and fly up into the sky!
  - who: kinnu_hd
    do: talk
    text: Can you tell me, what is six minus two?
  - who: kinnu_hd
    do: talk
    text: Take a moment. Count it in your head, or use your fingers to help.
  - who: kinnu_hd
    do: talk
    text: Do not worry if it feels hard. We will do it together, slowly.
  - who: kinnu_hd
    do: talk
    text: Ready? Let us solve it on the board, step by step.
  overlays:
  - type: banner
    text: Your Turn!
    start: 0.0
    end: 4.0
    color: blue
- id: s5_solve
  background: classroom_full.png
  transition:
    in: 0.3
    out: 0.25
  characters:
  - id: kinnu_hd
    pos:
    - 0.17
    - 0.99
    scale: 0.9
    facing: right
  actions:
  - who: kinnu_hd
    do: point
    side: right
    start: 0.2
    end: 12.0
  - who: kinnu_hd
    do: talk
    text: Let us solve six minus two, step by step, all together.
  - who: kinnu_hd
    do: talk
    text: First, we start with the bigger number, six.
  - who: kinnu_hd
    do: talk
    text: Now, to subtract, we count backwards. We jump back two steps.
  - who: kinnu_hd
    do: talk
    text: From six we go back one step to five. Then back one more step to four.
  - who: kinnu_hd
    do: talk
    text: So six minus two equals four. You did it, well done!
  - who: kinnu_hd
    do: talk
    text: Let us check our answer. Four balloons are left, and two flew away. Four and two make six. Perfect!
  - who: kinnu_hd
    do: talk
    text: Here is a handy trick to always remember.
  - who: kinnu_hd
    do: talk
    text: For addition we count forward, and for subtraction we count back. Forward to add, back to subtract!
  - who: kinnu_hd
    do: talk
    text: Whenever you feel stuck, just use your fingers and count backwards slowly.
  board:
    title: 6 - 2 = ?
    lines:
    - text: Start with 6
      at: 0.5
    - text: Jump back 2 steps
      at: 1.9
    - text: 6 ... 5 ... 4
      at: 3.3
    - text: 6 - 2 = 4
      at: 4.7
