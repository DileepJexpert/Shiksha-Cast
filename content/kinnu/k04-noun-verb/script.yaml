chapter: "Kinnu Finds the Missing Word | Noun and Verb"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki rangin duniya mein aapka swagat hai! आज एक बड़ा mystery hai. Kinnu ek sentence padh rahi hai — Kinnu blank! अरे, बीच का word gayab ho gaya! कौन सा शब्द missing hai? Kinnu सोचती है — चलो दोस्तों, मिलकर इस Missing Word ko dhoondhte hain. आज हम सीखेंगे Noun aur Verb! Ready? Let's go!"
  - n: 2
    voice: kavya
    narration: "पहले Kinnu samajhti hai — Noun kya hota hai? Noun ek naming word hai! यानी किसी चीज़, इंसान, या जगह का naam. जैसे — Kinnu, dog, school, ball, mango. ये सब naming words हैं! Kinnu खुश हो गई और बोली — मेरा naam Kinnu, ये भी एक noun hai! वाह!"
  - n: 3
    voice: kavya
    narration: "अब Kinnu ek mazedaar adventure mein jaati hai — Noun Park! वहाँ हर चीज़ का naam likha hai. एक tree, एक bird, एक river, एक house! Kinnu उँगली से point करती है — tree noun, bird noun, house noun! देखा दोस्तों? हर naming word ek noun hai. Kinnu समझ गई!"
  - n: 4
    voice: kavya
    narration: "अब दूसरा शब्द — Verb! Verb ek action word hai! यानी कोई काम करना. जैसे — run, jump, eat, sing, dance! Kinnu jump karti hai — jump ek verb hai! Kinnu daudti hai — run ek verb hai! Action दिखाओ, और बोलो verb! कितना मज़ा आ रहा है!"
  - n: 5
    voice: kavya
    narration: "तभी Kinnu pahunchti hai — Verb Valley! यहाँ सब hil-dul rahe hain. एक monkey jump kar raha hai, एक fish swim kar rahi hai, एक baby cry kar raha hai! Kinnu देखती है और samajh gayi — jump, swim, cry — ये सब action words हैं, यानी verbs! शाबाश Kinnu!"
  - n: 6
    voice: kavya
    narration: "अब Kinnu wapas aati hai us missing word wale sentence par. Kinnu blank! सोचो दोस्तों — Kinnu kya kar rahi hai? वो run कर रही है! तो missing word hai — runs! Kinnu runs! और देखो — run ek verb hai, action word! Kinnu ने mystery solve कर दी! ताली बजाओ!"
  - n: 7
    voice: kavya
    narration: "अब practice time! चलो अब तुम करो. मैं बोलूँगी एक word, तुम बताओ noun या verb! पहला — apple! सोचो… apple ek naming word hai, तो ये noun hai! दूसरा — dance! ये action word hai, तो ये verb hai! वाह, तुम तो बहुत smart हो!"
  - n: 8
    voice: kavya
    narration: "एक aur try karo! Word hai — school! ये एक जगह का naam hai, तो school ek noun hai! और अब — sing! गाना yani action, तो sing ek verb hai! देखा? Naming word noun, action word verb. इतना आसान! Kinnu को aap par बहुत proud feel हो रहा है!"
  - n: 9
    voice: kavya
    narration: "तो आज हमने क्या सीखा? Noun ek naming word hai — naam batane wala. Verb ek action word hai — kaam batane wala. Kinnu noun hai, run verb hai! अगर मज़ा आया तो Kinnu ko like aur subscribe ज़रूर करना. Learn with Kinnu again! A Katixo channel. बाय-बाय, फिर मिलेंगे!"
