episode: vibhu-sheet-rig-demo
title: Vibhu Sheet Rig Demo
fps: 15
cast:
  vibhu_sheet_hd: am_adam
scenes:
  - id: hello
    background: classroom_full.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: vibhu_sheet_hd, pos: [0.50, 0.99], scale: 0.86, facing: right }
    overlays:
      - { type: banner, text: "Vibhu sheet rig demo", color: yellow, start: 0.0, end: 4.5 }
      - { type: label, text: "new ChatGPT parts sheet", pos: [0.50, 0.22], color: white, start: 0.4, end: 4.5 }
    actions:
      - { who: vibhu_sheet_hd, do: wave, start: 0.2, end: 2.6 }
      - { who: vibhu_sheet_hd, do: talk, text: "Hi! I am Vibhu. Now I can talk, wave, and move!" }

  - id: point_cheer
    background: playground.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: vibhu_sheet_hd, pos: [0.50, 0.99], scale: 0.86, facing: right }
    overlays:
      - { type: label, text: "point + cheer", pos: [0.50, 0.18], color: yellow, start: 0.0, end: 5.2 }
    actions:
      - { who: vibhu_sheet_hd, do: point, side: right, start: 0.1, end: 2.2 }
      - { who: vibhu_sheet_hd, do: cheer, start: 2.4, end: 5.2 }
      - { who: vibhu_sheet_hd, do: talk, text: "Look there! Hooray, this is fun!" }

  - id: emotions_jump
    background: garden.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: vibhu_sheet_hd, pos: [0.50, 0.99], scale: 0.86, facing: right }
    overlays:
      - { type: label, text: "sad, cry, jump", pos: [0.50, 0.18], color: yellow, start: 0.0, end: 6.4 }
    actions:
      - { who: vibhu_sheet_hd, do: sad, start: 0.0, end: 1.4 }
      - { who: vibhu_sheet_hd, do: cry, start: 1.4, end: 3.0 }
      - { who: vibhu_sheet_hd, do: jump, start: 3.2, end: 4.5 }
      - { who: vibhu_sheet_hd, do: cheer, start: 4.6, end: 6.4 }

  - id: walk_run
    background: playground.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: vibhu_sheet_hd, pos: [0.20, 0.99], scale: 0.86, facing: right }
    overlays:
      - { type: label, text: "walk + run", pos: [0.50, 0.18], color: yellow, start: 0.0, end: 6.2 }
    actions:
      - { who: vibhu_sheet_hd, do: walkto, to: 0.52, start: 0.2, end: 3.0 }
      - { who: vibhu_sheet_hd, do: runto, to: 0.82, start: 3.1, end: 6.0 }

  - id: swim_look
    background: pool.png
    transition: { in: 0.2, out: 0.4 }
    characters:
      - { id: vibhu_sheet_hd, pos: [0.25, 0.66], scale: 0.80, facing: right }
    overlays:
      - { type: label, text: "swim + look around", pos: [0.50, 0.16], color: yellow, start: 0.0, end: 6.2 }
    actions:
      - { who: vibhu_sheet_hd, do: swimto, to: 0.72, start: 0.0, end: 3.4 }
      - { who: vibhu_sheet_hd, do: look_left, start: 3.6, end: 4.4 }
      - { who: vibhu_sheet_hd, do: look_right, start: 4.5, end: 5.3 }
      - { who: vibhu_sheet_hd, do: look_back, start: 5.4, end: 6.2 }
