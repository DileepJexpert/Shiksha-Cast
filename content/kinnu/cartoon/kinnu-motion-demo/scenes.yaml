episode: kinnu-motion-demo
title: Kinnu Motion Demo - walk, run, swim, jump, dance
fps: 30
cast:
  kinnu_hd: af_heart
  anshu_hd: am_michael
scenes:
  - id: s1
    background: classroom_full.png
    transition: { in: 0.4, out: 0.3 }
    characters: [{ id: kinnu_hd, pos: [0.30, 0.99], scale: 0.9, facing: right }]
    actions:
      - { who: kinnu_hd, do: enter, from: left, start: 0.0, end: 2.6 }
      - { who: kinnu_hd, do: wave, start: 2.6, end: 6 }
      - { who: kinnu_hd, do: talk, text: "Hello friends! Welcome to our classroom. Watch all the things I can do today!" }

  - id: s2
    background: playground.png
    transition: { in: 0.3, out: 0.3 }
    characters: [{ id: kinnu_hd, pos: [0.15, 0.99], scale: 0.9, facing: right }]
    actions:
      - { who: kinnu_hd, do: walkto, to: 0.82, start: 0.2, end: 4.5 }
      - { who: kinnu_hd, do: talk, text: "First, I can walk! Walk, walk, walk across the playground." }

  - id: s3
    background: playground.png
    transition: { in: 0.3, out: 0.3 }
    characters:
      - { id: kinnu_hd, pos: [0.22, 0.99], scale: 0.9, facing: right }
      - { id: anshu_hd, pos: [0.12, 0.99], scale: 0.9, facing: right }
    actions:
      - { who: kinnu_hd, do: wave, start: 0.2, end: 6 }
      - { who: anshu_hd, do: runto, to: 0.85, start: 0.2, end: 3.0 }
      - { who: anshu_hd, do: talk, text: "Wheee! Watch me run super fast!" }
      - { who: kinnu_hd, do: talk, text: "Wow Anshu, you can run so fast!" }

  - id: s4
    background: garden.png
    transition: { in: 0.3, out: 0.3 }
    characters: [{ id: kinnu_hd, pos: [0.5, 0.99], scale: 0.9, facing: right }]
    actions:
      - { who: kinnu_hd, do: bounce, start: 0.2, end: 6 }
      - { who: kinnu_hd, do: talk, text: "I can jump up high! Jump, jump, jump!" }

  - id: s5
    background: garden.png
    transition: { in: 0.3, out: 0.3 }
    characters: [{ id: kinnu_hd, pos: [0.5, 0.99], scale: 0.9, facing: right }]
    actions:
      - { who: kinnu_hd, do: dance, start: 0.2, end: 6 }
      - { who: kinnu_hd, do: talk, text: "Now let us dance together! La la la, shake shake!" }

  - id: s6
    background: pool.png
    transition: { in: 0.3, out: 0.3 }
    characters: [{ id: kinnu_hd, pos: [0.25, 0.90], scale: 0.8, facing: right }]
    actions:
      - { who: kinnu_hd, do: swimto, to: 0.72, start: 0.2, end: 5.5 }
      - { who: kinnu_hd, do: talk, text: "And I can swim in the pool! Splash, splash, splash!" }

  - id: s7
    background: garden.png
    transition: { in: 0.3, out: 0.5 }
    camera: { zoom: [1.0, 1.05] }
    characters:
      - { id: kinnu_hd, pos: [0.36, 0.99], scale: 0.9, facing: right }
      - { id: anshu_hd, pos: [0.64, 0.99], scale: 0.9, facing: left }
    actions:
      - { who: kinnu_hd, do: cheer, start: 0.0, end: 3.0 }
      - { who: anshu_hd, do: cheer, start: 0.0, end: 3.0 }
      - { who: kinnu_hd, do: talk, text: "That was so much fun, my friends!" }
      - { who: anshu_hd, do: talk, text: "See you next time. Bye bye!" }
