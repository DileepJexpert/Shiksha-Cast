episode: kinnu-buddy-movement-demo
title: Buddy Dog Movement Demo
fps: 15
cast:
  buddy_hd: am_michael
scenes:
  - id: hello_bark
    background: playground.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: buddy_hd, pos: [0.50, 0.99], scale: 0.72, facing: right }
    overlays:
      - { type: banner, text: "Buddy dog rig demo", color: yellow, start: 0.0, end: 4.0 }
      - { type: label, text: "new sheet asset, separate dog", pos: [0.50, 0.22], color: white, start: 0.3, end: 4.5 }
    actions:
      - { who: buddy_hd, do: smile, start: 0.0, end: 1.0 }
      - { who: buddy_hd, do: bark, start: 1.0, end: 4.5 }

  - id: walk
    background: playground.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: buddy_hd, pos: [0.20, 0.99], scale: 0.72, facing: right }
    overlays:
      - { type: label, text: "walk cycle", pos: [0.50, 0.18], color: yellow, start: 0.0, end: 4.6 }
    actions:
      - { who: buddy_hd, do: walkto, to: 0.58, start: 0.2, end: 4.4 }
      - { who: buddy_hd, do: smile, start: 0.0, end: 4.6 }

  - id: run
    background: garden.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: buddy_hd, pos: [0.20, 0.99], scale: 0.72, facing: right }
    overlays:
      - { type: label, text: "run cycle", pos: [0.50, 0.18], color: yellow, start: 0.0, end: 3.6 }
    actions:
      - { who: buddy_hd, do: runto, to: 0.82, start: 0.1, end: 3.4 }
      - { who: buddy_hd, do: bark, start: 0.4, end: 3.2 }

  - id: jump
    background: garden.png
    transition: { in: 0.2, out: 0.2 }
    characters:
      - { id: buddy_hd, pos: [0.50, 0.99], scale: 0.72, facing: right }
    overlays:
      - { type: label, text: "jump + bark", pos: [0.50, 0.18], color: yellow, start: 0.0, end: 3.4 }
    actions:
      - { who: buddy_hd, do: jump, start: 0.0, end: 1.4 }
      - { who: buddy_hd, do: jump, start: 1.5, end: 2.9 }
      - { who: buddy_hd, do: bark, start: 0.0, end: 3.4 }

  - id: expression
    background: home.png
    transition: { in: 0.2, out: 0.4 }
    characters:
      - { id: buddy_hd, pos: [0.50, 0.99], scale: 0.72, facing: right }
    overlays:
      - { type: label, text: "growl, bark, tail wag", pos: [0.50, 0.18], color: yellow, start: 0.0, end: 5.0 }
    actions:
      - { who: buddy_hd, do: growl, start: 0.0, end: 1.8 }
      - { who: buddy_hd, do: bark, start: 1.8, end: 5.0 }
