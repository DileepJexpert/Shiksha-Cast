chapter: "Kinnu Crosses the Star Bridge | Counting 1 to 10"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki jadui duniya mein swagat hai! आज रात Kinnu आसमान में एक Star Bridge देखती है — taaron ka pul! Kinnu गिनती है और कहती है — एक, दो, चार, सात स्टार! अरे रुको! क्या ये counting सही है? नहीं नहीं! चलो दोस्तों, Kinnu ke saath ek se das tak ginna seekhte hain. Ready? Let's go!"
  - n: 2
    voice: kavya
    narration: "Star Bridge पर हैं das chamakte stars. हर star पर kudkar Kinnu paar karegi. पहला star — एक! Kinnu उस पर चढ़ती है और khush ho gayi. One star! चलो मेरे साथ बोलो — एक! देखो कितना shiny star है!"
  - n: 3
    voice: kavya
    narration: "Kinnu agle star par kudti hai. अब आता है दूसरा star — दो! फिर तीसरा — तीन! एक, दो, तीन! Kinnu hansti hai aur kehti hai — ये तो मज़ेदार है! चलो साथ में — one, two, three! तीन stars हो गए, दोस्तों!"
  - n: 4
    voice: kavya
    narration: "Kinnu आगे बढ़ती है — चार, पाँच! चौथा star, पाँचवाँ star! Kinnu समझ गई — हर बार ek number aage. एक, दो, तीन, चार, पाँच! Five stars! आधा pul paar ho gaya. शाबाश Kinnu, keep going!"
  - n: 5
    voice: kavya
    narration: "अब Kinnu kudti hai — छह, सात! फिर आठ! एक, दो, तीन, चार, पाँच, छह, सात, आठ! Six, seven, eight! Kinnu ko thoda dar lagta hai, par वो बहादुर है. Kinnu kehti hai — मैं कर सकती हूँ! बस दो stars और बचे हैं!"
  - n: 6
    voice: kavya
    narration: "लगभग पहुँच गई! नौवाँ star — नौ! और आखिरी — दस! एक से दस तक — एक, दो, तीन, चार, पाँच, छह, सात, आठ, नौ, दस! Ten stars! Kinnu ne poora Star Bridge paar kar liya! वाह, Kinnu samajh gayi — सही counting एक, दो, तीन ऐसे ही चलती है!"
  - n: 7
    voice: kavya
    narration: "अब आता है practice time! चलो अब तुम करो. आसमान में हैं कुछ stars. मेरे साथ ज़ोर से गिनो — एक, दो, तीन, चार, पाँच, छह, सात, आठ, नौ, दस! क्या तुमने सब गिने? शाबाश! तुम तो counting champion हो, दोस्तों!"
  - n: 8
    voice: kavya
    narration: "तो आज हमने क्या सीखा? एक से दस तक सही counting! एक, दो, तीन, चार, पाँच, छह, सात, आठ, नौ, दस! हर number ek-ek karke aata hai. अगर मज़ा आया तो Learn with Kinnu again! Like aur subscribe karo. A Katixo channel. बाय-बाय, फिर मिलेंगे!"
