chapter: "Kinnu and the Slippery Floor | Friction Explained"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki masti bhari duniya mein swagat hai! आज Kinnu एक gili-chikni floor par chalti hai — और धड़ाम! फिसल गई! Kinnu kehti hai — ज़मीन ने मुझे पकड़ने की कोशिश की, इसलिए मैं तेज़ी से दौड़ी! अरे नहीं! क्या ये सही है? चलो दोस्तों, मिलकर friction समझते हैं. Ready? Let's go!"
  - n: 2
    voice: kavya
    narration: "देखो दोस्तों! Kinnu ek smooth, gili tiles wali floor par hai. वो चलने की कोशिश करती है — पर फिसलती जाती है! Kinnu गिर जाती है — धड़ाम! Kinnu sochti hai — ये क्या हुआ? यहाँ कुछ तो missing है. वो चीज़ है — friction!"
  - n: 3
    voice: kavya
    narration: "तभी teacher कहती हैं — Kinnu, friction एक force है! जब do cheezein ek doosre ko ragadti hain, तो friction उन्हें रोकता है, grip देता है. Smooth gili floor par friction बहुत kam होता है, इसलिए तुम फिसली. समझ गई Kinnu? Friction यानी pakad!"
  - n: 4
    voice: kavya
    narration: "Kinnu ek experiment karti hai. वो एक toy car चिकनी टाइल पर चलाती है — कार दूर तक sarrr… चली जाती है! फिर वही car carpet par — थोड़ी ही दूर रुक गई! क्यों? क्योंकि carpet par zyada friction hai. Kinnu samajh gayi — rough cheez = zyada grip!"
  - n: 5
    voice: kavya
    narration: "अब Kinnu apne juton ko dekhti hai. Shoes ke neeche hote hain rough, lehardaar grooves — यही देते हैं grip! इसी से हम बिना फिसले चल पाते हैं. Sports shoes, car ke tyres — सब में rough lines hoti hain. ये सब friction के दोस्त हैं, दोस्तों!"
  - n: 6
    voice: kavya
    narration: "Kinnu rough chappal pehenti hai aur fir se gili floor par chalti hai. इस बार — कोई फिसलन नहीं! Kinnu खुश हो गई. वो kehti hai — जहाँ rough surface, वहाँ zyada friction, वहाँ achhi grip! Smooth aur gila = kam friction = phisalna. Wah!"
  - n: 7
    voice: kavya
    narration: "अब आता है practice time! चलो अब तुम करो. सोचो — बर्फ par skate तेज़ क्यों चलती है? क्योंकि बर्फ smooth है, friction kam hai! और सोचो — pencil ko haath se pakadna easy क्यों? क्योंकि हाथ aur pencil में friction है! शाबाश, तुम तो smart ho!"
  - n: 8
    voice: kavya
    narration: "तो आज हमने क्या सीखा? Friction ek force hai jo cheezon ko grip deta hai aur rokta hai. Rough surface par zyada friction, smooth gili surface par kam friction. इसीलिए हम rough shoes pehente hain! अगर मज़ा आया तो Learn with Kinnu again! Like aur subscribe karo. A Katixo channel. बाय-बाय!"
