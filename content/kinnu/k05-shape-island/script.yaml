chapter: "Kinnu's Shape Island | Circle, Square, Triangle"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki rangin duniya mein aapka swagat hai! आज Kinnu ek mystery map dekhti hai. Map kehta hai — Shape Island par chhupa hai ek treasure! लेकिन रुको — Kinnu बोली, ये triangle to teen pairon wala circle hai! अरे नहीं Kinnu, ये तो galat hai! चलो दोस्तों, Shape Island chalte hain aur shapes seekhte hain! Ready? Let's go!"
  - n: 2
    voice: kavya
    narration: "Kinnu pahunchti hai Shape Island par! सबसे पहले मिलता है — Circle! Circle ek round shape hai. इसका कोई corner नहीं, बस गोल-गोल! जैसे — sun, ball, pizza, और चाँद! Kinnu उँगली से गोल घुमाती है — round and round! देखा दोस्तों? यही है circle!"
  - n: 3
    voice: kavya
    narration: "अब Kinnu aage badhti hai aur milta hai — Square! Square ke hote hain chaar barabar sides aur chaar corners! जैसे — chocolate ka tukda, window, aur biscuit! Kinnu गिनती है — एक, दो, तीन, चार sides! सब barabar! वाह, ये है square! Kinnu खुश हो गई!"
  - n: 4
    voice: kavya
    narration: "तभी aata hai — Triangle! Triangle ke hote hain sirf teen sides aur teen corners! जैसे — samosa, slice of pizza, aur pahaad ki choti! Kinnu गिनती है — एक, दो, तीन sides! Teen corners bhi! देखा? तीन वाला shape hai triangle! अब Kinnu samajh gayi!"
  - n: 5
    voice: kavya
    narration: "अब Kinnu wapas dekhti hai us galat baat par. उसने कहा था triangle teen pairon wala circle hai! अरे नहीं Kinnu! Circle gol hota hai, उसके corner नहीं. Triangle ke hote hain teen sides aur teen corners! Kinnu hass padi — oho, meri galti! अब Kinnu sab samajh gayi!"
  - n: 6
    voice: kavya
    narration: "चलो दोस्तों, सब shapes ko yaad karte hain! Circle — gol-gol, koi corner nahi. Square — chaar barabar sides. Triangle — teen sides, teen corners. Kinnu sab par point karti hai — ek, do, teen! Round, four, three! शाबाश, हम तो shape detective ban gaye!"
  - n: 7
    voice: kavya
    narration: "अब practice time! चलो अब तुम करो. यहाँ है ek pizza ka pura plate — ये round hai, तो ये कौन सा shape hai? सोचो… जवाब है — circle! और ये window — इसके chaar barabar sides hain, तो ये है — square! वाह, तुम तो बहुत smart हो!"
  - n: 8
    voice: kavya
    narration: "एक aur try karo! Kinnu dikhati hai ek garam-garam samosa! इसके teen sides aur teen corners hain. ये कौन सा shape hai? सोचो… हाँ! ये है triangle! तीन वाला shape! Kinnu ताली बजाती है — तुमने तो सारे shapes pehchaan liye! Super!"
  - n: 9
    voice: kavya
    narration: "और देखो — treasure mil gaya! Shape Island ka khazana tha — shapes ka gyaan! तो आज हमने क्या सीखा? Circle gol hota hai, square ke chaar sides, triangle ke teen sides. अगर मज़ा आया तो Kinnu ko like aur subscribe ज़रूर करना. Learn with Kinnu again! A Katixo channel. बाय-बाय, फिर मिलेंगे!"
