chapter: "Kinnu's Money Shop | Counting Coins"
brand: "KINNU"
slides:
  - n: 1
    voice: kavya
    narration: "नमस्ते दोस्तों! Kinnu ki rangin duniya mein aapka swagat hai! आज Kinnu ने एक छोटी सी shop खोली है — Kinnu's Money Shop! लेकिन अरे — एक customer आया और Kinnu बोली, इस toffee का दाम है सौ rupees! सौ?! एक toffee के लिए?! क्या ये सही है? चलो दोस्तों, मिलकर coins गिनना सीखते हैं — Let's go!"
  - n: 2
    voice: kavya
    narration: "देखो दोस्तों! Kinnu के पास हैं चमकते हुए coins. ये है एक rupee — ₹1. ये है दो rupee — ₹2. ये है पाँच rupee — ₹5. और ये है दस rupee — ₹10. हर coin की अलग value होती है! Kinnu खुश हो गई और बोली — चलो इनसे shopping करते हैं!"
  - n: 3
    voice: kavya
    narration: "पहला customer आया — उसे चाहिए एक toffee. Toffee का दाम है तीन rupees — ₹3. Kinnu सोचती है — कौन से coins दूँ? वो उठाती है एक ₹2 coin और एक ₹1 coin. चलो गिनो — दो… और एक… बराबर तीन! ₹2 plus ₹1 बराबर ₹3. शाबाश Kinnu!"
  - n: 4
    voice: kavya
    narration: "अगला customer आया — उसे चाहिए एक pencil. Pencil का दाम है पाँच rupees — ₹5. Kinnu के पास है एक ₹5 का coin! वो खुशी से बोली — बस एक ही coin! देखो, एक ₹5 coin बराबर पाँच rupees. कभी-कभी एक ही coin से काम हो जाता है. कितना आसान!"
  - n: 5
    voice: kavya
    narration: "अब आया एक बड़ा order — एक copy, दाम है दस rupees, ₹10! Kinnu के पास एक ₹10 का coin नहीं है. कोई बात नहीं! वो उठाती है दो ₹5 coins. चलो गिनो — पाँच… और पाँच… बराबर दस! ₹5 plus ₹5 बराबर ₹10. Kinnu समझ गई — अलग coins से भी same value बन सकती है!"
  - n: 6
    voice: kavya
    narration: "चलो एक मज़ेदार example लेते हैं! एक customer को चाहिए चॉकलेट, दाम है सात rupees — ₹7. Kinnu उठाती है एक ₹5 coin, एक ₹2 coin. चलो गिनो — पाँच… और दो… बराबर सात! ₹5 plus ₹2 बराबर ₹7. वाह! Coins को jodkar सही दाम बन गया!"
  - n: 7
    voice: kavya
    narration: "अब आता है quiz time! चलो अब तुम करो. एक balloon का दाम है छह rupees — ₹6. तुम्हारे पास हैं ₹5, ₹2, और ₹1 coins. सोचो ज़रा — कौन से coins दोगे? हाँ! एक ₹5 और एक ₹1 — पाँच plus एक बराबर छह! ₹6! वाह दोस्तों, तुम तो बहुत smart shopkeeper हो!"
  - n: 8
    voice: kavya
    narration: "तो आज हमने क्या सीखा? Coins होते हैं ₹1, ₹2, ₹5 और ₹10, और हर coin की अपनी value है. Coins को गिनकर और jodkar हम सही दाम बना सकते हैं! और हाँ — एक toffee सौ rupees की नहीं होती, बस तीन rupees की! Learn with Kinnu again! अगर मज़ा आया तो like और subscribe ज़रूर करना. A Katixo channel. बाय-बाय, फिर मिलेंगे!"
