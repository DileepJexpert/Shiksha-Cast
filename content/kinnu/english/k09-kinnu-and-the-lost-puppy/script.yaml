chapter: Kinnu and the Lost Puppy
slides:
  - n: 1
    narration: >-
      Today, Kinnu is playing in the park. Suddenly, she hears a tiny cry near the bench.
      A little puppy looks scared and alone. Kinnu decides to help him.

  - n: 2
    narration: >-
      Kinnu sits near the puppy and speaks gently. She says, "Do not worry, little puppy.
      I am here to help you." The puppy looks at her with sad eyes.

  - n: 3
    narration: >-
      Kinnu sees a small tag on the puppy's collar. The tag says Buddy.
      Now Kinnu knows the puppy's name. "Hello Buddy," she says with a smile.

  - n: 4
    narration: >-
      Kinnu does the right thing. She asks the park guard for help.
      "Have you seen Buddy's family?" she asks politely. The guard thinks carefully.

  - n: 5
    narration: >-
      Buddy starts walking and sniffing the ground. Kinnu notices tiny paw prints on the path.
      Maybe these paw prints can help them find Buddy's owner.

  - n: 6
    narration: >-
      A kind gardener sees Kinnu and Buddy. He points toward the big fountain and says,
      "I saw a boy looking for a puppy there." Kinnu thanks him and walks quickly.

  - n: 7
    narration: >-
      Near the fountain, a worried boy is holding an empty leash.
      He is looking everywhere for his puppy. Buddy sees him and begins to wag his tail.

  - n: 8
    narration: >-
      Buddy runs back to his owner. The boy smiles and hugs Buddy happily.
      Kinnu feels proud because she helped Buddy get home safely.

  - n: 9
    narration: >-
      The boy says, "Thank you, Kinnu." Kinnu smiles and says,
      "We should always help others when they are in trouble."

  - n: 10
    narration: >-
      Great job, friends. Today we learned to be kind, ask for help, and return lost pets safely.
      See you again with Kinnu. Like and subscribe. A Katixo channel.
