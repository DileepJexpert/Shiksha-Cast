chapter: Kinnu & Color Balloon Rescue!
slides:
  - n: 1
    narration: >-
      Oh no. Kinnu's color balloons flew away. Let us help Kinnu rescue the balloons and learn colors.
  - n: 2
    narration: >-
      The first balloon is red. An apple can be red. Say it with Kinnu: red.
  - n: 3
    narration: >-
      The next balloon is yellow. The sun can be yellow. Say it with Kinnu: yellow.
  - n: 4
    narration: >-
      This balloon is blue. The sky can be blue. Say it with Kinnu: blue.
  - n: 5
    narration: >-
      This balloon is green. Leaves can be green. Say it with Kinnu: green.
  - n: 6
    narration: >-
      This balloon is orange. An orange fruit is orange. Say it with Kinnu: orange.
  - n: 7
    narration: >-
      This balloon is purple. Grapes can be purple. Say it with Kinnu: purple.
  - n: 8
    narration: >-
      Great job. Today we learned red, yellow, blue, green, orange, and purple. See you again with Kinnu. Like and subscribe. A Katixo channel.
