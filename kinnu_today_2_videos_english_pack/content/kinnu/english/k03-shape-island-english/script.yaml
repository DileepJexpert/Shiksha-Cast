chapter: Kinnu & Shape Island!
slides:
  - n: 1
    narration: >-
      Kinnu has reached a magical island. This is Shape Island. Today, we will learn circle, square, triangle, and rectangle with Kinnu.
  - n: 2
    narration: >-
      This is a circle. A circle is round like a ball. Say it with Kinnu: circle.
  - n: 3
    narration: >-
      This is a square. A square has four equal sides. Say it with Kinnu: square.
  - n: 4
    narration: >-
      This is a triangle. A triangle has three sides. Count with Kinnu: one, two, three.
  - n: 5
    narration: >-
      This is a rectangle. A rectangle looks like a long box. A door, a book, and a TV can look like a rectangle.
  - n: 6
    narration: >-
      Now it is shape hunt time. Look around with Kinnu. Can you find a circle, a square, a triangle, and a rectangle?
  - n: 7
    narration: >-
      Now it is your turn. Look at the screen and tell Kinnu: which one is a triangle? Pause the video and say the answer.
  - n: 8
    narration: >-
      Great job. Today we learned circle, square, triangle, and rectangle. See you again with Kinnu. Like and subscribe. A Katixo channel.
