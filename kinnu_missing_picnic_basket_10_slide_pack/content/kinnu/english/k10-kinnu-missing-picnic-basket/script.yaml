chapter: Kinnu and the Missing Picnic Basket
slides:
  - n: 1
    narration: >-
      Today, Kinnu is excited for a picnic in the park. She brings a big smile,
      a cozy picnic mat, and her favorite basket.

  - n: 2
    narration: >-
      Oh no! When Kinnu looks around, the picnic basket is missing.
      Kinnu feels surprised, but she stays calm and starts to think.

  - n: 3
    narration: >-
      Kinnu spots a trail of clues on the path. She sees apple slices, a sandwich,
      and a little napkin. These clues might lead to the basket.

  - n: 4
    narration: >-
      Kinnu asks for help politely. A kind gardener points down the park path
      and tells her to keep looking carefully.

  - n: 5
    narration: >-
      Kinnu follows the flower path through the bright, colorful park.
      Step by step, she gets closer to finding the basket.

  - n: 6
    narration: >-
      Kinnu crosses the bridge and looks ahead. There, in the distance,
      she can see something bright near the trees.

  - n: 7
    narration: >-
      There it is! Kinnu finds the missing picnic basket resting safely
      under a big tree beside the flowers.

  - n: 8
    narration: >-
      Picnic time! Kinnu opens the basket and sets out apples, sandwiches,
      and juice. Now the fun picnic can begin.

  - n: 9
    narration: >-
      After the picnic, Kinnu cleans the park and puts the trash in the bin.
      A clean park is a happy park for everyone.

  - n: 10
    narration: >-
      Great job, friends. Today we learned to stay calm, follow clues,
      ask for help, and keep the park clean. See you next time with Kinnu.
