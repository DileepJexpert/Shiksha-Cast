branding:
  intro: assets/intro.mp4
  mascot_overlay: null
  outro: assets/outro.mp4
channel: Katixo Shiksha
fps: 30
imagegen:
  provider: sdxl
  model: stabilityai/sdxl-turbo
  num_steps: 4
  # Per-slide motion for `ai-build`: kenburns | parallax | static.
  # parallax = DepthFlow 2.5D depth animation (run `parallax-check` first).
  motion: kenburns
  # parallax_command: optional override; placeholders {image} {output} {duration} {fps} {width} {height}
music:
  bed: assets/music/gentle_learning.mp3
  duck_db: -18
resolution:
- 1920
- 1080
timing:
  min_slide_s: 4
  pad_after_ms: 700
  pad_before_ms: 300
voice:
  description: 'A young female speaker with a clear, friendly Indian English accent
    delivers an educational lecture in a lively, engaging tone. She speaks at a moderate
    pace, enunciating clearly. The recording is studio quality with no background
    noise.

    '
  model: maitri
  provider: veena
  sample_rate: 24000
